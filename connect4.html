<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎮 四目並べ</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    h1 {
      font-size: 2rem;
      color: #fff;
      text-shadow: 0 2px 12px rgba(0,0,0,0.25);
      margin-bottom: 20px;
      letter-spacing: 0.04em;
    }

    /* ── Score ── */
    .score-wrap {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
    }

    .score-card {
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(10px);
      border-radius: 14px;
      padding: 10px 28px;
      text-align: center;
      color: #fff;
      min-width: 110px;
    }

    .score-card .s-name { font-size: 0.78rem; opacity: 0.85; margin-bottom: 2px; }
    .score-card .s-num  { font-size: 2rem; font-weight: 700; }
    .p1-card .s-num { color: #ff8a80; }
    .p2-card .s-num { color: #fff59d; }

    /* ── Turn display ── */
    .turn-display {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.22);
      backdrop-filter: blur(10px);
      border-radius: 50px;
      padding: 10px 24px;
      margin-bottom: 20px;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      min-width: 220px;
      justify-content: center;
      transition: background 0.3s;
    }

    .turn-piece {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      transition: background 0.3s;
    }

    /* ── Board ── */
    .board-wrap {
      background: #1565c0;
      border-radius: 18px;
      padding: 14px;
      box-shadow:
        0 24px 64px rgba(0,0,0,0.45),
        inset 0 2px 4px rgba(255,255,255,0.12);
    }

    .board {
      display: flex;
      gap: 8px;
    }

    .col-btn {
      display: flex;
      flex-direction: column;
      gap: 8px;
      cursor: pointer;
      padding: 6px 4px;
      border-radius: 10px;
      transition: background 0.15s;
    }

    .col-btn:hover:not(.disabled) { background: rgba(255,255,255,0.13); }
    .col-btn.disabled { cursor: not-allowed; }

    .cell {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: #0d47a1;
      box-shadow: inset 0 4px 10px rgba(0,0,0,0.45);
      transition: background 0.15s, box-shadow 0.15s;
    }

    .cell.p1 {
      background: #f44336;
      box-shadow: 0 4px 14px rgba(244,67,54,0.6), inset 0 2px 4px rgba(255,255,255,0.25);
    }

    .cell.p2 {
      background: #ffeb3b;
      box-shadow: 0 4px 14px rgba(255,235,59,0.6), inset 0 2px 4px rgba(255,255,255,0.35);
    }

    .cell.preview-p1 {
      background: rgba(244,67,54,0.35);
      box-shadow: inset 0 4px 10px rgba(0,0,0,0.2);
    }

    .cell.preview-p2 {
      background: rgba(255,235,59,0.35);
      box-shadow: inset 0 4px 10px rgba(0,0,0,0.2);
    }

    .cell.win {
      animation: winPulse 0.55s ease-in-out infinite alternate;
    }

    @keyframes winPulse {
      from { transform: scale(1);    box-shadow: 0 4px 14px rgba(255,255,255,0.3); }
      to   { transform: scale(1.12); box-shadow: 0 0 28px rgba(255,255,255,0.85); }
    }

    @keyframes dropIn {
      0%   { transform: translateY(-280px); opacity: 0.5; }
      75%  { transform: translateY(8px); }
      100% { transform: translateY(0); }
    }

    .cell.dropping { animation: dropIn 0.28s cubic-bezier(0.25,0.46,0.45,0.94) forwards; }

    /* ── Buttons ── */
    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    .action-btn {
      padding: 11px 28px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255,255,255,0.4);
      border-radius: 50px;
      color: #fff;
      font-size: 0.92rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, transform 0.1s;
    }

    .action-btn:hover { background: rgba(255,255,255,0.32); transform: translateY(-2px); }

    /* ── Win Banner ── */
    .backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 99;
    }

    .backdrop.show { display: block; }

    .win-banner {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      background: #fff;
      border-radius: 24px;
      padding: 44px 60px;
      text-align: center;
      box-shadow: 0 24px 80px rgba(0,0,0,0.4);
      z-index: 100;
    }

    .win-banner.show {
      display: block;
      animation: popIn 0.35s cubic-bezier(0.175,0.885,0.32,1.275) forwards;
    }

    @keyframes popIn {
      from { transform: translate(-50%,-50%) scale(0.6); opacity: 0; }
      to   { transform: translate(-50%,-50%) scale(1);   opacity: 1; }
    }

    .win-emoji  { font-size: 4rem; margin-bottom: 12px; }
    .win-title  { font-size: 1.9rem; font-weight: 700; color: #333; margin-bottom: 6px; }
    .win-sub    { font-size: 1rem; color: #888; margin-bottom: 28px; }

    .play-again-btn {
      padding: 14px 36px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      border-radius: 50px;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s, transform 0.1s;
    }

    .play-again-btn:hover { opacity: 0.88; transform: translateY(-2px); }

    @media (max-width: 500px) {
      h1   { font-size: 1.5rem; }
      .cell { width: 40px; height: 40px; }
      .board-wrap { padding: 10px; }
      .board { gap: 5px; }
      .col-btn { gap: 5px; padding: 4px 3px; }
      .win-banner { padding: 32px 28px; width: 90vw; }
      .win-title { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

  <canvas id="confettiCanvas" style="position:fixed;top:0;left:0;pointer-events:none;z-index:200;"></canvas>

  <div class="backdrop" id="backdrop"></div>
  <div class="win-banner" id="winBanner">
    <div class="win-emoji" id="winEmoji">🎉</div>
    <div class="win-title" id="winTitle"></div>
    <div class="win-sub"   id="winSub"></div>
    <button class="play-again-btn" onclick="newRound()">もう一度遊ぶ 🔄</button>
  </div>

  <h1>🎮 四目並べ</h1>

  <div class="score-wrap">
    <div class="score-card p1-card">
      <div class="s-name">🔴 プレイヤー 1</div>
      <div class="s-num" id="score1">0</div>
    </div>
    <div class="score-card p2-card">
      <div class="s-name">🟡 プレイヤー 2</div>
      <div class="s-num" id="score2">0</div>
    </div>
  </div>

  <div class="turn-display" id="turnDisplay">
    <div class="turn-piece" id="turnPiece"></div>
    <span id="turnText"></span>
  </div>

  <div class="board-wrap">
    <div class="board" id="board"></div>
  </div>

  <div class="btn-row">
    <button class="action-btn" onclick="newRound()">🔄 リセット</button>
  </div>

  <script>
    const ROWS = 6, COLS = 7, EMPTY = 0, P1 = 1, P2 = 2;
    const COLOR  = { [P1]: '#f44336', [P2]: '#ffeb3b' };
    const NAME   = { [P1]: 'プレイヤー 1', [P2]: 'プレイヤー 2' };
    const EMOJI  = { [P1]: '🔴', [P2]: '🟡' };

    let board, current, over, hovCol;
    const scores = { [P1]: 0, [P2]: 0 };

    // ── Init ──────────────────────────────────────────────────────
    function newRound() {
      board   = Array.from({length: ROWS}, () => Array(COLS).fill(EMPTY));
      current = P1;
      over    = false;
      hovCol  = -1;
      document.getElementById('winBanner').classList.remove('show');
      document.getElementById('backdrop').classList.remove('show');
      stopConfetti();
      renderBoard();
      updateTurn();
    }

    // ── Render ────────────────────────────────────────────────────
    function renderBoard() {
      const el = document.getElementById('board');
      el.innerHTML = '';

      for (let c = 0; c < COLS; c++) {
        const colEl = document.createElement('div');
        colEl.className = 'col-btn' + (board[0][c] !== EMPTY ? ' disabled' : '');

        colEl.addEventListener('mouseenter', () => { if (!over) { hovCol = c; renderBoard(); } });
        colEl.addEventListener('mouseleave', () => { if (!over) { hovCol = -1; renderBoard(); } });
        colEl.addEventListener('click',      () => drop(c));

        // Find preview row for hover
        let prevRow = -1;
        if (!over && hovCol === c && board[0][c] === EMPTY) {
          for (let r = ROWS - 1; r >= 0; r--) {
            if (board[r][c] === EMPTY) { prevRow = r; break; }
          }
        }

        for (let r = 0; r < ROWS; r++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          if      (board[r][c] === P1) cell.classList.add('p1');
          else if (board[r][c] === P2) cell.classList.add('p2');
          else if (r === prevRow)      cell.classList.add(current === P1 ? 'preview-p1' : 'preview-p2');

          colEl.appendChild(cell);
        }
        el.appendChild(colEl);
      }
    }

    // ── Drop ──────────────────────────────────────────────────────
    function drop(col) {
      if (over) return;

      let row = -1;
      for (let r = ROWS - 1; r >= 0; r--) {
        if (board[r][col] === EMPTY) { row = r; break; }
      }
      if (row === -1) return;

      board[row][col] = current;
      hovCol = -1;
      renderBoard();
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          const colEls = document.getElementById('board').children;
          if (colEls[col]) colEls[col].children[row].classList.add('dropping');
        });
      });

      const win = checkWin(row, col);
      if (win) {
        over = true;
        scores[current]++;
        document.getElementById(`score${current}`).textContent = scores[current];
        setTimeout(() => { highlightWin(win); showWinBanner(current); }, 320);
        return;
      }

      if (board[0].every((v, c) => board[0][c] !== EMPTY)) {
        over = true;
        setTimeout(showDrawBanner, 320);
        return;
      }

      current = current === P1 ? P2 : P1;
      updateTurn();
    }

    // ── Win check ─────────────────────────────────────────────────
    function checkWin(row, col) {
      const p = board[row][col];
      for (const [dr, dc] of [[0,1],[1,0],[1,1],[1,-1]]) {
        const cells = [[row, col]];
        for (const sign of [-1, 1]) {
          let r = row + dr * sign, c = col + dc * sign;
          while (r >= 0 && r < ROWS && c >= 0 && c < COLS && board[r][c] === p) {
            cells.push([r, c]);
            r += dr * sign; c += dc * sign;
          }
        }
        if (cells.length >= 4) return cells;
      }
      return null;
    }

    function highlightWin(cells) {
      const colEls = document.getElementById('board').children;
      cells.forEach(([r, c]) => colEls[c].children[r].classList.add('win'));
    }

    // ── Banners ───────────────────────────────────────────────────
    function showWinBanner(p) {
      document.getElementById('winEmoji').textContent = EMOJI[p];
      document.getElementById('winTitle').textContent = `${NAME[p]} の勝ち！`;
      document.getElementById('winSub').textContent   = 'おめでとう！🎊';
      document.getElementById('winBanner').classList.add('show');
      document.getElementById('backdrop').classList.add('show');
      launchConfetti(COLOR[p]);
    }

    function showDrawBanner() {
      document.getElementById('winEmoji').textContent = '🤝';
      document.getElementById('winTitle').textContent = '引き分け！';
      document.getElementById('winSub').textContent   = 'いい勝負でした！';
      document.getElementById('winBanner').classList.add('show');
      document.getElementById('backdrop').classList.add('show');
    }

    // ── Turn indicator ────────────────────────────────────────────
    function updateTurn() {
      document.getElementById('turnPiece').style.background = COLOR[current];
      document.getElementById('turnText').textContent       = `${NAME[current]} のターン`;
    }

    // ── Confetti ──────────────────────────────────────────────────
    const canvas = document.getElementById('confettiCanvas');
    const ctx    = canvas.getContext('2d');
    let particles = [], rafId = null;

    function launchConfetti(base) {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
      const palette = [base, '#fff', '#ffd700', '#ff6b6b', '#00ffb4', '#a78bfa'];
      particles = Array.from({length: 100}, () => ({
        x: Math.random() * canvas.width,
        y: -20 - Math.random() * 100,
        w: Math.random() * 10 + 5,
        h: Math.random() * 6 + 3,
        color: palette[Math.floor(Math.random() * palette.length)],
        vy: Math.random() * 2 + 2,
        vx: (Math.random() - 0.5) * 2,
        rot: Math.random() * 360,
        rotSpeed: (Math.random() - 0.5) * 6,
      }));
      if (rafId) cancelAnimationFrame(rafId);
      animConfetti();
    }

    function animConfetti() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        ctx.save();
        ctx.translate(p.x + p.w / 2, p.y + p.h / 2);
        ctx.rotate(p.rot * Math.PI / 180);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        ctx.restore();
        p.y   += p.vy;
        p.x   += p.vx;
        p.rot += p.rotSpeed;
      });
      particles = particles.filter(p => p.y < canvas.height);
      if (particles.length > 0) rafId = requestAnimationFrame(animConfetti);
    }

    function stopConfetti() {
      if (rafId) cancelAnimationFrame(rafId);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles = [];
    }

    // ── Start ─────────────────────────────────────────────────────
    newRound();
  </script>
</body>
</html>
