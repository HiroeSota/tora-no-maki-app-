<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🔥 プッシュ四目並べ</title>
  <style>
    :root {
      --cell: 52px;
      --gap:  8px;
      --slide: 60px; /* cell + gap */
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 12px;
    }

    h1 {
      color: #fff;
      font-size: 1.8rem;
      text-shadow: 0 2px 14px rgba(0,0,0,0.25);
      margin-bottom: 10px;
      letter-spacing: 0.03em;
    }

    .how-to {
      background: rgba(255,255,255,0.22);
      backdrop-filter: blur(8px);
      border-radius: 10px;
      padding: 7px 18px;
      color: #fff;
      font-size: 0.8rem;
      margin-bottom: 16px;
      text-align: center;
      line-height: 1.6;
    }

    /* ── Score ── */
    .score-wrap { display: flex; gap: 14px; margin-bottom: 14px; }

    .score-card {
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(8px);
      border-radius: 12px;
      padding: 8px 22px;
      color: #fff;
      text-align: center;
      min-width: 105px;
    }

    .score-card .s-name { font-size: 0.75rem; opacity: 0.85; margin-bottom: 2px; }
    .score-card .s-num  { font-size: 1.8rem; font-weight: 700; }
    .p1-card .s-num { color: #ffd6d6; }
    .p2-card .s-num { color: #d6eeff; }

    /* ── Turn ── */
    .turn-display {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.22);
      backdrop-filter: blur(8px);
      border-radius: 50px;
      padding: 9px 22px;
      margin-bottom: 18px;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
    }

    .turn-piece {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      transition: background 0.3s;
    }

    /* ── Game layout ── */
    .game-area {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .arrow-col {
      display: flex;
      flex-direction: column;
      gap: var(--gap);
    }

    /* ── Push buttons ── */
    .push-btn {
      width: 44px;
      height: var(--cell);
      border: none;
      border-radius: 10px;
      font-size: 1.4rem;
      cursor: pointer;
      font-family: inherit;
      color: #fff;
      transition: transform 0.12s, opacity 0.15s, background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.22);
    }

    .push-btn.p1-style { background: rgba(245,87,108,0.55); }
    .push-btn.p2-style { background: rgba(79,172,254,0.55); }
    .push-btn:hover:not(:disabled) { transform: scale(1.12); }
    .push-btn:active:not(:disabled) { transform: scale(0.93); }
    .push-btn:disabled { opacity: 0.25; cursor: not-allowed; transform: none; }

    /* ── Board ── */
    .board-wrap {
      background: #1a1a2e;
      border-radius: 18px;
      padding: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45), inset 0 1px 2px rgba(255,255,255,0.07);
    }

    .board {
      display: flex;
      flex-direction: column;
      gap: var(--gap);
    }

    /* Row with overflow clip for slide animation */
    .row-wrap {
      overflow: hidden;
      border-radius: 6px;
    }

    .row-inner {
      display: flex;
      gap: var(--gap);
    }

    @keyframes slideFromLeft {
      from { transform: translateX(calc(-1 * var(--slide))); }
      to   { transform: translateX(0); }
    }

    @keyframes slideFromRight {
      from { transform: translateX(var(--slide)); }
      to   { transform: translateX(0); }
    }

    .row-inner.anim-left  { animation: slideFromLeft  0.28s cubic-bezier(0.25,0.46,0.45,0.94); }
    .row-inner.anim-right { animation: slideFromRight 0.28s cubic-bezier(0.25,0.46,0.45,0.94); }

    /* ── Cells ── */
    .cell {
      width: var(--cell);
      height: var(--cell);
      border-radius: 50%;
      background: #16213e;
      box-shadow: inset 0 3px 10px rgba(0,0,0,0.5);
      flex-shrink: 0;
    }

    .cell.p1 {
      background: #f5576c;
      box-shadow: 0 4px 14px rgba(245,87,108,0.65), inset 0 2px 4px rgba(255,255,255,0.2);
    }

    .cell.p2 {
      background: #4facfe;
      box-shadow: 0 4px 14px rgba(79,172,254,0.6), inset 0 2px 4px rgba(255,255,255,0.2);
    }

    .cell.win { animation: winPulse 0.55s ease-in-out infinite alternate; }

    @keyframes winPulse {
      from { transform: scale(1);    filter: brightness(1); }
      to   { transform: scale(1.14); filter: brightness(1.45); }
    }

    /* ── Buttons ── */
    .btn-row { display: flex; gap: 12px; margin-top: 18px; }

    .action-btn {
      padding: 11px 26px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(8px);
      border: 2px solid rgba(255,255,255,0.4);
      border-radius: 50px;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, transform 0.1s;
    }

    .action-btn:hover { background: rgba(255,255,255,0.32); transform: translateY(-2px); }

    /* ── Win banner ── */
    .backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; }
    .backdrop.show { display: block; }

    .win-banner {
      display: none;
      position: fixed;
      top: 50%; left: 50%;
      background: #fff;
      border-radius: 24px;
      padding: 40px 56px;
      text-align: center;
      box-shadow: 0 24px 80px rgba(0,0,0,0.4);
      z-index: 100;
    }

    .win-banner.show {
      display: block;
      animation: popIn 0.35s cubic-bezier(0.175,0.885,0.32,1.275) forwards;
    }

    @keyframes popIn {
      from { transform: translate(-50%,-50%) scale(0.6); opacity: 0; }
      to   { transform: translate(-50%,-50%) scale(1);   opacity: 1; }
    }

    .win-emoji { font-size: 3.5rem; margin-bottom: 10px; }
    .win-title { font-size: 1.8rem; font-weight: 700; color: #333; margin-bottom: 6px; }
    .win-sub   { font-size: 0.92rem; color: #888; margin-bottom: 24px; }

    .play-again-btn {
      padding: 13px 32px;
      background: linear-gradient(135deg, #f093fb, #f5576c);
      border: none;
      border-radius: 50px;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s, transform 0.1s;
    }

    .play-again-btn:hover { opacity: 0.88; transform: translateY(-2px); }

    @media (max-width: 540px) {
      :root { --cell: 38px; --gap: 5px; --slide: 43px; }
      h1 { font-size: 1.3rem; }
      .push-btn { width: 34px; font-size: 1rem; }
      .game-area { gap: 6px; }
      .board-wrap { padding: 9px; }
      .win-banner { padding: 28px 22px; width: 88vw; }
      .win-title { font-size: 1.35rem; }
    }
  </style>
</head>
<body>

  <canvas id="confettiCanvas" style="position:fixed;top:0;left:0;pointer-events:none;z-index:200;"></canvas>

  <div class="backdrop" id="backdrop"></div>
  <div class="win-banner" id="winBanner">
    <div class="win-emoji" id="winEmoji">🎉</div>
    <div class="win-title" id="winTitle"></div>
    <div class="win-sub"   id="winSub"></div>
    <button class="play-again-btn" onclick="newRound()">もう一度遊ぶ 🔄</button>
  </div>

  <h1>🔥 プッシュ四目並べ</h1>

  <div class="how-to">
    ← / → を押して行にコマを挿入 → 反対端のコマが押し出される！<br>
    縦・横・斜めに4つ並べたら勝ち 🏆
  </div>

  <div class="score-wrap">
    <div class="score-card p1-card">
      <div class="s-name">🔴 プレイヤー 1</div>
      <div class="s-num" id="score1">0</div>
    </div>
    <div class="score-card p2-card">
      <div class="s-name">🔵 プレイヤー 2</div>
      <div class="s-num" id="score2">0</div>
    </div>
  </div>

  <div class="turn-display">
    <div class="turn-piece" id="turnPiece"></div>
    <span id="turnText"></span>
  </div>

  <div class="game-area">
    <div class="arrow-col" id="leftArrows"></div>
    <div class="board-wrap">
      <div class="board" id="board"></div>
    </div>
    <div class="arrow-col" id="rightArrows"></div>
  </div>

  <div class="btn-row">
    <button class="action-btn" onclick="newRound()">🔄 リセット</button>
  </div>

  <script>
    const ROWS = 6, COLS = 7;
    const EMPTY = 0, P1 = 1, P2 = 2;
    const COLOR = { [P1]: '#f5576c', [P2]: '#4facfe' };
    const NAME  = { [P1]: 'プレイヤー 1', [P2]: 'プレイヤー 2' };
    const EMOJI = { [P1]: '🔴', [P2]: '🔵' };

    let board, current, over, animating;
    const scores = { [P1]: 0, [P2]: 0 };

    // ── Cell helper ───────────────────────────────────────────────
    function cellEl(r, c) { return document.getElementById(`c${r}-${c}`); }

    function renderCell(r, c) {
      const el = cellEl(r, c);
      el.className = 'cell';
      if      (board[r][c] === P1) el.classList.add('p1');
      else if (board[r][c] === P2) el.classList.add('p2');
    }

    // ── Build DOM (once) ──────────────────────────────────────────
    function buildDOM() {
      ['board','leftArrows','rightArrows'].forEach(id =>
        document.getElementById(id).innerHTML = '');

      const boardEl = document.getElementById('board');
      const leftEl  = document.getElementById('leftArrows');
      const rightEl = document.getElementById('rightArrows');

      for (let r = 0; r < ROWS; r++) {
        // Left button
        const lb = document.createElement('button');
        lb.className = 'push-btn';
        lb.id = `lb${r}`;
        lb.textContent = '←';
        lb.onclick = () => push(r, 'left');
        leftEl.appendChild(lb);

        // Row
        const wrap  = document.createElement('div');
        wrap.className = 'row-wrap';
        const inner = document.createElement('div');
        inner.className = 'row-inner';
        inner.id = `row${r}`;
        for (let c = 0; c < COLS; c++) {
          const div = document.createElement('div');
          div.className = 'cell';
          div.id = `c${r}-${c}`;
          inner.appendChild(div);
        }
        wrap.appendChild(inner);
        boardEl.appendChild(wrap);

        // Right button
        const rb = document.createElement('button');
        rb.className = 'push-btn';
        rb.id = `rb${r}`;
        rb.textContent = '→';
        rb.onclick = () => push(r, 'right');
        rightEl.appendChild(rb);
      }
    }

    // ── Push logic ────────────────────────────────────────────────
    function push(row, dir) {
      if (over || animating) return;
      animating = true;
      lockButtons(true);

      if (dir === 'left') {
        for (let c = COLS - 1; c > 0; c--) board[row][c] = board[row][c - 1];
        board[row][0] = current;
      } else {
        for (let c = 0; c < COLS - 1; c++) board[row][c] = board[row][c + 1];
        board[row][COLS - 1] = current;
      }

      // Update DOM
      for (let c = 0; c < COLS; c++) renderCell(row, c);

      // Slide animation
      const rowEl = document.getElementById(`row${row}`);
      const animClass = dir === 'left' ? 'anim-left' : 'anim-right';
      rowEl.classList.add(animClass);
      rowEl.addEventListener('animationend', () => {
        rowEl.classList.remove(animClass);
        animating = false;

        const win = checkWin();
        if (win) {
          over = true;
          scores[current]++;
          document.getElementById(`score${current}`).textContent = scores[current];
          win.forEach(([r, c]) => cellEl(r, c).classList.add('win'));
          setTimeout(() => showWinBanner(current), 400);
          return;
        }

        current = current === P1 ? P2 : P1;
        updateTurn();
        lockButtons(false);
      }, { once: true });
    }

    // ── Win check ─────────────────────────────────────────────────
    function checkWin() {
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const p = board[r][c];
          if (!p) continue;
          for (const [dr, dc] of [[0,1],[1,0],[1,1],[1,-1]]) {
            const cells = [];
            for (let i = 0; i < 4; i++) {
              const nr = r + dr * i, nc = c + dc * i;
              if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS || board[nr][nc] !== p) break;
              cells.push([nr, nc]);
            }
            if (cells.length === 4) return cells;
          }
        }
      }
      return null;
    }

    // ── New round ─────────────────────────────────────────────────
    function newRound() {
      board     = Array.from({length: ROWS}, () => Array(COLS).fill(EMPTY));
      current   = P1;
      over      = false;
      animating = false;
      document.getElementById('winBanner').classList.remove('show');
      document.getElementById('backdrop').classList.remove('show');
      stopConfetti();
      for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++) renderCell(r, c);
      updateTurn();
      lockButtons(false);
    }

    // ── UI helpers ────────────────────────────────────────────────
    function updateTurn() {
      const cls = current === P1 ? 'p1-style' : 'p2-style';
      document.querySelectorAll('.push-btn').forEach(b => {
        b.className = `push-btn ${cls}`;
      });
      document.getElementById('turnPiece').style.background = COLOR[current];
      document.getElementById('turnText').textContent = `${NAME[current]} のターン`;
    }

    function lockButtons(lock) {
      document.querySelectorAll('.push-btn').forEach(b => b.disabled = lock);
    }

    // ── Win banner ────────────────────────────────────────────────
    function showWinBanner(p) {
      document.getElementById('winEmoji').textContent = EMOJI[p];
      document.getElementById('winTitle').textContent = `${NAME[p]} の勝ち！`;
      document.getElementById('winSub').textContent   = 'おめでとう！🎊';
      document.getElementById('winBanner').classList.add('show');
      document.getElementById('backdrop').classList.add('show');
      launchConfetti(COLOR[p]);
    }

    // ── Confetti ──────────────────────────────────────────────────
    const canvas = document.getElementById('confettiCanvas');
    const ctx    = canvas.getContext('2d');
    let particles = [], rafId = null;

    function launchConfetti(base) {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
      const palette = [base, '#fff', '#ffd700', '#f093fb', '#4facfe', '#f5576c'];
      particles = Array.from({length: 110}, () => ({
        x: Math.random() * canvas.width,
        y: -20 - Math.random() * 120,
        w: Math.random() * 10 + 4,
        h: Math.random() * 6 + 3,
        color: palette[Math.floor(Math.random() * palette.length)],
        vy: Math.random() * 2.5 + 1.5,
        vx: (Math.random() - 0.5) * 2.5,
        rot: Math.random() * 360,
        rotSpeed: (Math.random() - 0.5) * 6,
      }));
      if (rafId) cancelAnimationFrame(rafId);
      animConfetti();
    }

    function animConfetti() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        ctx.save();
        ctx.translate(p.x + p.w / 2, p.y + p.h / 2);
        ctx.rotate(p.rot * Math.PI / 180);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        ctx.restore();
        p.y += p.vy; p.x += p.vx; p.rot += p.rotSpeed;
      });
      particles = particles.filter(p => p.y < canvas.height);
      if (particles.length > 0) rafId = requestAnimationFrame(animConfetti);
    }

    function stopConfetti() {
      if (rafId) cancelAnimationFrame(rafId);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles = [];
    }

    // ── Start ─────────────────────────────────────────────────────
    buildDOM();
    newRound();
  </script>
</body>
</html>
