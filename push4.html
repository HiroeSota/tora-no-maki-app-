<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⬇️ プッシュ四目並べ</title>
  <style>
    :root {
      --cell: 72px;
      --gap:  10px;
      --step: 82px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    h1 {
      font-size: 2rem;
      color: #fff;
      text-shadow: 0 2px 12px rgba(0,0,0,0.25);
      margin-bottom: 12px;
      letter-spacing: 0.04em;
    }

    .how-to {
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(10px);
      border-radius: 10px;
      padding: 7px 20px;
      color: #fff;
      font-size: 0.82rem;
      margin-bottom: 18px;
      text-align: center;
      line-height: 1.6;
    }

    /* ── Score ── */
    .score-wrap { display: flex; gap: 16px; margin-bottom: 16px; }

    .score-card {
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(10px);
      border-radius: 14px;
      padding: 10px 28px;
      text-align: center;
      color: #fff;
      min-width: 110px;
    }

    .score-card .s-name { font-size: 0.78rem; opacity: 0.85; margin-bottom: 2px; }
    .score-card .s-num  { font-size: 2rem; font-weight: 700; }
    .p1-card .s-num { color: #ff8a80; }
    .p2-card .s-num { color: #fff59d; }

    /* ── Turn ── */
    .turn-display {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.22);
      backdrop-filter: blur(10px);
      border-radius: 50px;
      padding: 10px 24px;
      margin-bottom: 10px;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      min-width: 220px;
      justify-content: center;
    }

    .turn-piece {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      transition: background 0.3s;
    }

    /* ── Timer bar ── */
    .timer-wrap {
      width: 310px;
      height: 26px;
      background: rgba(255,255,255,0.15);
      border-radius: 50px;
      margin-bottom: 18px;
      position: relative;
      overflow: hidden;
    }

    .timer-bar {
      height: 100%;
      border-radius: 50px;
      background: linear-gradient(90deg, #43e97b, #38f9d7);
      width: 100%;
    }

    .timer-bar.warning { background: linear-gradient(90deg, #f7971e, #ffd200); }
    .timer-bar.danger  { background: linear-gradient(90deg, #f44336, #ff6b6b); }
    .timer-bar.cpu     { background: rgba(255,255,255,0.25); }

    .timer-text {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-weight: 700;
      font-size: 0.85rem;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
      white-space: nowrap;
    }

    /* ── Board wrap ── */
    .board-wrap {
      background: #1565c0;
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.45), inset 0 2px 4px rgba(255,255,255,0.12);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ── Push buttons ── */
    .push-row { display: flex; gap: var(--gap); }

    .push-btn {
      width: var(--cell);
      height: 42px;
      border: none;
      border-radius: 10px;
      font-size: 1.5rem;
      cursor: pointer;
      color: #fff;
      font-family: inherit;
      transition: transform 0.12s, opacity 0.15s, background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.18);
    }

    .push-btn.p1-style { background: rgba(244,67,54,0.55); }
    .push-btn.p2-style { background: rgba(255,235,59,0.55); }
    .push-btn:hover:not(:disabled) { transform: scale(1.1); }
    .push-btn:active:not(:disabled) { transform: scale(0.92); }
    .push-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

    /* ── Board ── */
    .board { display: flex; gap: var(--gap); }

    .col-wrap { overflow: hidden; border-radius: 6px; }

    .col-inner {
      display: flex;
      flex-direction: column;
      gap: var(--gap);
    }

    @keyframes slideFromTop {
      from { transform: translateY(calc(-1 * var(--step))); }
      to   { transform: translateY(0); }
    }

    .col-inner.anim-down {
      animation: slideFromTop 0.28s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    /* ── Cells (3D sphere look) ── */
    .cell {
      width: var(--cell);
      height: var(--cell);
      border-radius: 50%;
      background: radial-gradient(circle at 38% 30%, #1a6fd4, #0d47a1 55%, #082d6e);
      box-shadow: inset 0 4px 10px rgba(0,0,0,0.5), inset 0 -2px 4px rgba(255,255,255,0.06);
      flex-shrink: 0;
    }

    .cell.p1 {
      background: radial-gradient(circle at 38% 30%, #ff8a80, #f44336 55%, #b71c1c);
      box-shadow: 0 6px 20px rgba(244,67,54,0.65), inset 0 -3px 7px rgba(0,0,0,0.3), inset 0 3px 6px rgba(255,255,255,0.25);
    }

    .cell.p2 {
      background: radial-gradient(circle at 38% 30%, #fff9c4, #ffeb3b 50%, #f57f17);
      box-shadow: 0 6px 20px rgba(255,235,59,0.65), inset 0 -3px 7px rgba(0,0,0,0.2), inset 0 3px 6px rgba(255,255,255,0.4);
    }

    .cell.win { animation: winPulse 0.55s ease-in-out infinite alternate; }

    @keyframes winPulse {
      from { transform: scale(1);    filter: brightness(1); }
      to   { transform: scale(1.14); filter: brightness(1.35); }
    }

    /* ── Action buttons ── */
    .btn-row { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; justify-content: center; }

    .action-btn {
      padding: 11px 24px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255,255,255,0.4);
      border-radius: 50px;
      color: #fff;
      font-size: 0.92rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, transform 0.1s;
    }

    .action-btn:hover { background: rgba(255,255,255,0.32); transform: translateY(-2px); }
    .action-btn.active { background: rgba(255,255,255,0.38); border-color: #fff; }

    /* ── Win banner ── */
    .backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; }
    .backdrop.show { display: block; }

    .win-banner {
      display: none;
      position: fixed;
      top: 50%; left: 50%;
      background: #fff;
      border-radius: 24px;
      padding: 44px 60px;
      text-align: center;
      box-shadow: 0 24px 80px rgba(0,0,0,0.4);
      z-index: 100;
    }

    .win-banner.show {
      display: block;
      animation: popIn 0.35s cubic-bezier(0.175,0.885,0.32,1.275) forwards;
    }

    @keyframes popIn {
      from { transform: translate(-50%,-50%) scale(0.6); opacity: 0; }
      to   { transform: translate(-50%,-50%) scale(1);   opacity: 1; }
    }

    .win-emoji  { font-size: 4rem; margin-bottom: 12px; }
    .win-title  { font-size: 1.9rem; font-weight: 700; color: #333; margin-bottom: 6px; }
    .win-sub    { font-size: 1rem; color: #888; margin-bottom: 28px; }

    .play-again-btn {
      padding: 14px 36px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      border-radius: 50px;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s, transform 0.1s;
    }

    .play-again-btn:hover { opacity: 0.88; transform: translateY(-2px); }

    @media (max-width: 500px) {
      :root { --cell: 56px; --gap: 8px; --step: 64px; }
      h1 { font-size: 1.5rem; }
      .push-btn { height: 36px; font-size: 1.2rem; }
      .board-wrap { padding: 10px; gap: 6px; }
      .timer-wrap { width: 260px; }
      .win-banner { padding: 32px 28px; width: 90vw; }
      .win-title { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

  <canvas id="confettiCanvas" style="position:fixed;top:0;left:0;pointer-events:none;z-index:200;"></canvas>

  <div class="backdrop" id="backdrop"></div>
  <div class="win-banner" id="winBanner">
    <div class="win-emoji" id="winEmoji">🎉</div>
    <div class="win-title" id="winTitle"></div>
    <div class="win-sub"   id="winSub"></div>
    <button class="play-again-btn" onclick="newRound()">もう一度遊ぶ 🔄</button>
  </div>

  <h1>⬇️ プッシュ四目並べ</h1>

  <div class="how-to">
    ↓ を押して列にコマを挿入 → 一番下のコマが押し出される！<br>
    縦・横・斜めに4つ並べたら勝ち 🏆　制限時間：30秒
  </div>

  <div class="score-wrap">
    <div class="score-card p1-card">
      <div class="s-name">🔴 プレイヤー 1</div>
      <div class="s-num" id="score1">0</div>
    </div>
    <div class="score-card p2-card">
      <div class="s-name" id="p2Label">🟡 プレイヤー 2</div>
      <div class="s-num" id="score2">0</div>
    </div>
  </div>

  <div class="turn-display">
    <div class="turn-piece" id="turnPiece"></div>
    <span id="turnText"></span>
  </div>

  <div class="timer-wrap">
    <div class="timer-bar" id="timerBar"></div>
    <span class="timer-text" id="timerText">30</span>
  </div>

  <div class="board-wrap">
    <div class="push-row" id="pushRow"></div>
    <div class="board"    id="board"></div>
  </div>

  <div class="btn-row">
    <button class="action-btn" onclick="newRound()">🔄 リセット</button>
    <button class="action-btn" id="cpuBtn" onclick="toggleCPU()">🤖 CPU対戦</button>
  </div>

  <script>
    const ROWS = 4, COLS = 4, EMPTY = 0, P1 = 1, P2 = 2;
    const TURN_TIME = 30;
    const COLOR = { [P1]: '#f44336', [P2]: '#ffeb3b' };
    const NAME  = { [P1]: 'プレイヤー 1', [P2]: 'プレイヤー 2' };
    const EMOJI = { [P1]: '🔴', [P2]: '🟡' };

    let board, current, over, animating, cpuMode;
    let timerRAF = null, timerStart = null;
    const scores = { [P1]: 0, [P2]: 0 };

    function cellEl(r, c) { return document.getElementById(`c${r}-${c}`); }

    function renderCell(r, c) {
      const el = cellEl(r, c);
      el.className = 'cell';
      if      (board[r][c] === P1) el.classList.add('p1');
      else if (board[r][c] === P2) el.classList.add('p2');
    }

    // ── Build DOM (once) ──────────────────────────────────────────
    function buildDOM() {
      const pushRow = document.getElementById('pushRow');
      const boardEl = document.getElementById('board');
      pushRow.innerHTML = '';
      boardEl.innerHTML = '';

      for (let c = 0; c < COLS; c++) {
        const btn = document.createElement('button');
        btn.className = 'push-btn';
        btn.id = `pb${c}`;
        btn.textContent = '↓';
        btn.onclick = () => push(c);
        pushRow.appendChild(btn);

        const wrap  = document.createElement('div');
        wrap.className = 'col-wrap';
        const inner = document.createElement('div');
        inner.className = 'col-inner';
        inner.id = `col${c}`;
        for (let r = 0; r < ROWS; r++) {
          const div = document.createElement('div');
          div.className = 'cell';
          div.id = `c${r}-${c}`;
          inner.appendChild(div);
        }
        wrap.appendChild(inner);
        boardEl.appendChild(wrap);
      }
    }

    // ── Push logic ────────────────────────────────────────────────
    function push(col) {
      if (over || animating) return;
      animating = true;
      stopTimer();
      lockButtons(true);

      for (let r = ROWS - 1; r > 0; r--) board[r][col] = board[r - 1][col];
      board[0][col] = current;

      for (let r = 0; r < ROWS; r++) renderCell(r, col);

      const colEl = document.getElementById(`col${col}`);
      colEl.classList.add('anim-down');
      colEl.addEventListener('animationend', () => {
        colEl.classList.remove('anim-down');
        animating = false;

        const win = checkWin();
        if (win) {
          over = true;
          scores[current]++;
          document.getElementById(`score${current}`).textContent = scores[current];
          win.forEach(([r, c]) => cellEl(r, c).classList.add('win'));
          setTimeout(() => showWinBanner(current), 400);
          return;
        }

        current = current === P1 ? P2 : P1;
        updateTurn();
        lockButtons(false);

        if (cpuMode && current === P2) {
          showCPUThinking();
          setTimeout(doCPUMove, 700);
        } else {
          startTimer();
        }
      }, { once: true });
    }

    // ── Timer ─────────────────────────────────────────────────────
    function startTimer() {
      stopTimer();
      timerStart = Date.now();
      timerRAF = requestAnimationFrame(tickTimer);
    }

    function stopTimer() {
      if (timerRAF) cancelAnimationFrame(timerRAF);
      timerRAF = null;
      timerStart = null;
    }

    function tickTimer() {
      const elapsed   = (Date.now() - timerStart) / 1000;
      const remaining = Math.max(0, TURN_TIME - elapsed);
      updateTimerBar(remaining);

      if (remaining <= 0) {
        stopTimer();
        autoRandomPush();
        return;
      }
      timerRAF = requestAnimationFrame(tickTimer);
    }

    function autoRandomPush() {
      if (animating) { setTimeout(autoRandomPush, 100); return; }
      push(Math.floor(Math.random() * COLS));
    }

    function updateTimerBar(remaining) {
      const pct = (remaining / TURN_TIME) * 100;
      const bar = document.getElementById('timerBar');
      const txt = document.getElementById('timerText');
      bar.style.width = `${pct}%`;
      txt.textContent = Math.ceil(remaining);
      bar.className = 'timer-bar';
      if (remaining <= 5)       bar.classList.add('danger');
      else if (remaining <= 10) bar.classList.add('warning');
    }

    function showCPUThinking() {
      const bar = document.getElementById('timerBar');
      const txt = document.getElementById('timerText');
      bar.className = 'timer-bar cpu';
      bar.style.width = '100%';
      txt.textContent = 'CPU が考え中…';
    }

    // ── CPU logic ─────────────────────────────────────────────────
    function doCPUMove() {
      if (over) return;
      push(cpuPickCol());
    }

    function cpuPickCol() {
      // 1. Win if possible
      for (let c = 0; c < COLS; c++) {
        if (checkWinOnBoard(simulatePush(board, c, P2))) return c;
      }
      // 2. Block opponent's win
      for (let c = 0; c < COLS; c++) {
        if (checkWinOnBoard(simulatePush(board, c, P1))) return c;
      }
      // 3. Random
      return Math.floor(Math.random() * COLS);
    }

    function simulatePush(b, col, player) {
      const copy = b.map(r => [...r]);
      for (let r = ROWS - 1; r > 0; r--) copy[r][col] = copy[r - 1][col];
      copy[0][col] = player;
      return copy;
    }

    function checkWinOnBoard(b) {
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const p = b[r][c];
          if (!p) continue;
          for (const [dr, dc] of [[0,1],[1,0],[1,1],[1,-1]]) {
            let count = 0;
            for (let i = 0; i < 4; i++) {
              const nr = r + dr*i, nc = c + dc*i;
              if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS || b[nr][nc] !== p) break;
              count++;
            }
            if (count === 4) return true;
          }
        }
      }
      return false;
    }

    // ── Win check (returns cells) ─────────────────────────────────
    function checkWin() {
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const p = board[r][c];
          if (!p) continue;
          for (const [dr, dc] of [[0,1],[1,0],[1,1],[1,-1]]) {
            const cells = [];
            for (let i = 0; i < 4; i++) {
              const nr = r + dr*i, nc = c + dc*i;
              if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS || board[nr][nc] !== p) break;
              cells.push([nr, nc]);
            }
            if (cells.length === 4) return cells;
          }
        }
      }
      return null;
    }

    // ── New round ─────────────────────────────────────────────────
    function newRound() {
      stopTimer();
      board     = Array.from({length: ROWS}, () => Array(COLS).fill(EMPTY));
      current   = P1;
      over      = false;
      animating = false;
      document.getElementById('winBanner').classList.remove('show');
      document.getElementById('backdrop').classList.remove('show');
      stopConfetti();
      for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++) renderCell(r, c);
      updateTurn();
      lockButtons(false);
      startTimer();
    }

    // ── CPU toggle ────────────────────────────────────────────────
    function toggleCPU() {
      cpuMode = !cpuMode;
      const btn = document.getElementById('cpuBtn');
      btn.classList.toggle('active', cpuMode);
      btn.textContent = cpuMode ? '🤖 CPU対戦 ON' : '🤖 CPU対戦';
      document.getElementById('p2Label').textContent = cpuMode ? '🤖 CPU' : '🟡 プレイヤー 2';
      newRound();
    }

    // ── UI helpers ────────────────────────────────────────────────
    function updateTurn() {
      const cls = current === P1 ? 'p1-style' : 'p2-style';
      document.querySelectorAll('.push-btn').forEach(b => b.className = `push-btn ${cls}`);
      document.getElementById('turnPiece').style.background = COLOR[current];
      const label = (cpuMode && current === P2) ? 'CPU のターン' : `${NAME[current]} のターン`;
      document.getElementById('turnText').textContent = label;
    }

    function lockButtons(lock) {
      document.querySelectorAll('.push-btn').forEach(b => b.disabled = lock);
    }

    function showWinBanner(p) {
      const name = (cpuMode && p === P2) ? 'CPU' : NAME[p];
      document.getElementById('winEmoji').textContent = EMOJI[p];
      document.getElementById('winTitle').textContent = `${name} の勝ち！`;
      document.getElementById('winSub').textContent   = 'おめでとう！🎊';
      document.getElementById('winBanner').classList.add('show');
      document.getElementById('backdrop').classList.add('show');
      launchConfetti(COLOR[p]);
    }

    // ── Confetti ──────────────────────────────────────────────────
    const canvas = document.getElementById('confettiCanvas');
    const ctx    = canvas.getContext('2d');
    let particles = [], rafId = null;

    function launchConfetti(base) {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
      const palette = [base, '#fff', '#ffd700', '#ff6b6b', '#00ffb4', '#a78bfa'];
      particles = Array.from({length: 100}, () => ({
        x: Math.random() * canvas.width,
        y: -20 - Math.random() * 100,
        w: Math.random() * 10 + 5,
        h: Math.random() * 6 + 3,
        color: palette[Math.floor(Math.random() * palette.length)],
        vy: Math.random() * 2 + 2,
        vx: (Math.random() - 0.5) * 2,
        rot: Math.random() * 360,
        rotSpeed: (Math.random() - 0.5) * 6,
      }));
      if (rafId) cancelAnimationFrame(rafId);
      animConfetti();
    }

    function animConfetti() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        ctx.save();
        ctx.translate(p.x + p.w/2, p.y + p.h/2);
        ctx.rotate(p.rot * Math.PI / 180);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
        ctx.restore();
        p.y += p.vy; p.x += p.vx; p.rot += p.rotSpeed;
      });
      particles = particles.filter(p => p.y < canvas.height);
      if (particles.length > 0) rafId = requestAnimationFrame(animConfetti);
    }

    function stopConfetti() {
      if (rafId) cancelAnimationFrame(rafId);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles = [];
    }

    // ── Start ─────────────────────────────────────────────────────
    cpuMode = false;
    buildDOM();
    newRound();
  </script>
</body>
</html>
