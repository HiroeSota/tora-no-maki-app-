<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🔴 プッシュ４</title>
  <style>
    :root { --cell: 72px; --gap: 10px; --step: 82px; }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    h1 {
      font-size: 2rem;
      color: #fff;
      text-shadow: 0 2px 12px rgba(0,0,0,0.25);
      margin-bottom: 10px;
      letter-spacing: 0.04em;
    }

    .tagline {
      color: rgba(255,255,255,0.85);
      font-size: 0.92rem;
      margin-bottom: 36px;
      text-align: center;
      line-height: 1.7;
    }

    /* ── Screens ── */
    #startScreen, #sizeScreen, #difficultyScreen, #gameScreen {
      display: none;
      flex-direction: column;
      align-items: center;
    }

    /* ── Card base ── */
    .card-btn {
      background: rgba(255,255,255,0.16);
      backdrop-filter: blur(12px);
      border: 2px solid rgba(255,255,255,0.28);
      border-radius: 20px;
      color: #fff;
      cursor: pointer;
      font-family: inherit;
      text-align: center;
      transition: background 0.2s, transform 0.18s, border-color 0.2s;
    }

    .card-btn:hover {
      background: rgba(255,255,255,0.26);
      border-color: rgba(255,255,255,0.6);
      transform: translateY(-5px);
    }

    .card-btn:active { transform: translateY(-2px); }

    /* ── Mode cards ── */
    .mode-cards { display: flex; gap: 20px; }

    .mode-card {
      padding: 32px 36px;
      min-width: 140px;
    }

    .mode-icon { font-size: 3.2rem; margin-bottom: 14px; }
    .mode-name { font-size: 1.25rem; font-weight: 700; margin-bottom: 6px; }
    .mode-desc { font-size: 0.8rem; opacity: 0.75; }

    /* ── Size cards ── */
    .size-cards { display: flex; gap: 16px; }

    .size-card { padding: 22px 20px; min-width: 110px; }

    .size-preview {
      display: grid;
      gap: 3px;
      margin: 0 auto 12px;
      width: 54px;
      height: 54px;
    }

    .size-preview.s4 { grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr); }
    .size-preview.s5 { grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(5, 1fr); }
    .size-preview.s6 { grid-template-columns: repeat(6, 1fr); grid-template-rows: repeat(6, 1fr); }

    .dot {
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
    }

    .size-label { font-size: 1.1rem; font-weight: 700; margin-bottom: 4px; }
    .size-desc  { font-size: 0.75rem; opacity: 0.75; }

    /* ── Difficulty cards ── */
    .diff-cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      width: 100%;
      max-width: 360px;
    }

    .diff-card { padding: 20px 14px; }
    .diff-card.diff-max {
      border-color: rgba(255,100,100,0.6);
      background: rgba(180,0,50,0.22);
    }
    .diff-card.diff-max:hover { background: rgba(180,0,50,0.36); }

    .diff-icon { font-size: 2rem; margin-bottom: 8px; }
    .diff-name { font-size: 1.05rem; font-weight: 700; margin-bottom: 4px; }
    .diff-desc { font-size: 0.72rem; opacity: 0.75; }

    .back-link {
      margin-top: 22px;
      color: rgba(255,255,255,0.75);
      font-size: 0.88rem;
      cursor: pointer;
      text-decoration: underline;
      background: none;
      border: none;
      font-family: inherit;
      transition: color 0.15s;
    }

    .back-link:hover { color: #fff; }

    /* ── Game UI ── */
    .how-to {
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(10px);
      border-radius: 10px;
      padding: 7px 20px;
      color: #fff;
      font-size: 0.82rem;
      margin-bottom: 18px;
      text-align: center;
      line-height: 1.6;
    }

    .score-wrap { display: flex; gap: 16px; margin-bottom: 16px; }

    .score-card {
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(10px);
      border-radius: 14px;
      padding: 10px 28px;
      text-align: center;
      color: #fff;
      min-width: 110px;
    }

    .score-card .s-name { font-size: 0.78rem; opacity: 0.85; margin-bottom: 2px; }
    .score-card .s-num  { font-size: 2rem; font-weight: 700; }
    .p1-card .s-num { color: #ff8a80; }
    .p2-card .s-num { color: #fff59d; }

    .turn-display {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.22);
      backdrop-filter: blur(10px);
      border-radius: 50px;
      padding: 10px 24px;
      margin-bottom: 10px;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      min-width: 220px;
      justify-content: center;
    }

    .turn-piece {
      width: 22px; height: 22px;
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      transition: background 0.3s;
    }

    /* ── Timer ── */
    .timer-wrap {
      width: 310px; height: 26px;
      background: rgba(255,255,255,0.15);
      border-radius: 50px;
      margin-bottom: 18px;
      position: relative;
      overflow: hidden;
    }

    .timer-bar {
      height: 100%;
      border-radius: 50px;
      background: linear-gradient(90deg, #43e97b, #38f9d7);
      width: 100%;
    }

    .timer-bar.warning { background: linear-gradient(90deg, #f7971e, #ffd200); }
    .timer-bar.danger  { background: linear-gradient(90deg, #f44336, #ff6b6b); }
    .timer-bar.cpu     { background: rgba(255,255,255,0.25); }

    .timer-text {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-weight: 700;
      font-size: 0.85rem;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
      white-space: nowrap;
    }

    /* ── Board ── */
    .board-wrap {
      background: #1565c0;
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.45), inset 0 2px 4px rgba(255,255,255,0.12);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .push-row { display: flex; gap: var(--gap); }

    .push-btn {
      width: var(--cell); height: 42px;
      border: none;
      border-radius: 10px;
      font-size: 1.4rem;
      cursor: pointer;
      color: #fff;
      font-family: inherit;
      transition: transform 0.12s, opacity 0.15s, background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.18);
    }

    .push-btn.p1-style { background: rgba(244,67,54,0.55); }
    .push-btn.p2-style { background: rgba(255,235,59,0.55); }
    .push-btn:hover:not(:disabled) { transform: scale(1.1); }
    .push-btn:active:not(:disabled) { transform: scale(0.92); }
    .push-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

    .board { display: flex; gap: var(--gap); }
    .col-wrap { overflow: hidden; border-radius: 6px; }
    .col-inner { display: flex; flex-direction: column; gap: var(--gap); }

    @keyframes slideFromTop {
      from { transform: translateY(calc(-1 * var(--step))); }
      to   { transform: translateY(0); }
    }

    .col-inner.anim-down {
      animation: slideFromTop 0.28s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    /* ── Cells ── */
    .cell {
      width: var(--cell); height: var(--cell);
      border-radius: 50%;
      background: radial-gradient(circle at 38% 30%, #1a6fd4, #0d47a1 55%, #082d6e);
      box-shadow: inset 0 4px 10px rgba(0,0,0,0.5);
      flex-shrink: 0;
    }

    .cell.p1 {
      background: radial-gradient(circle at 38% 30%, #ff8a80, #f44336 55%, #b71c1c);
      box-shadow: none;
    }

    .cell.p2 {
      background: radial-gradient(circle at 38% 30%, #fff9c4, #ffeb3b 50%, #f57f17);
      box-shadow: none;
    }

    .cell.win { animation: winPulse 0.55s ease-in-out infinite alternate; }

    @keyframes winPulse {
      from { transform: scale(1);    filter: brightness(1); }
      to   { transform: scale(1.14); filter: brightness(1.35); }
    }

    /* ── Action buttons ── */
    .btn-row {
      display: flex; gap: 12px;
      margin-top: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .action-btn {
      padding: 11px 24px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255,255,255,0.4);
      border-radius: 50px;
      color: #fff;
      font-size: 0.92rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, transform 0.1s;
    }

    .action-btn:hover { background: rgba(255,255,255,0.32); transform: translateY(-2px); }

    /* ── Win banner ── */
    .backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; }
    .backdrop.show { display: block; }

    .win-banner {
      display: none;
      position: fixed;
      top: 50%; left: 50%;
      background: #fff;
      border-radius: 24px;
      padding: 44px 56px;
      text-align: center;
      box-shadow: 0 24px 80px rgba(0,0,0,0.4);
      z-index: 100;
    }

    .win-banner.show {
      display: block;
      animation: popIn 0.35s cubic-bezier(0.175,0.885,0.32,1.275) forwards;
    }

    @keyframes popIn {
      from { transform: translate(-50%,-50%) scale(0.6); opacity: 0; }
      to   { transform: translate(-50%,-50%) scale(1);   opacity: 1; }
    }

    .win-emoji  { font-size: 4rem; margin-bottom: 12px; }
    .win-title  { font-size: 1.8rem; font-weight: 700; color: #333; margin-bottom: 6px; }
    .win-sub    { font-size: 1rem; color: #888; margin-bottom: 24px; }
    .win-buttons { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

    .play-again-btn {
      padding: 13px 24px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none; border-radius: 50px;
      color: #fff; font-size: 0.95rem; font-weight: 700;
      cursor: pointer; font-family: inherit;
      transition: opacity 0.15s, transform 0.1s;
    }

    .play-again-btn:hover { opacity: 0.88; transform: translateY(-2px); }

    .back-btn {
      padding: 13px 24px;
      background: #f0f0f0; border: none; border-radius: 50px;
      color: #555; font-size: 0.95rem; font-weight: 700;
      cursor: pointer; font-family: inherit;
      transition: background 0.15s, transform 0.1s;
    }

    .back-btn:hover { background: #e0e0e0; transform: translateY(-2px); }

    /* ── Eject fall animation ── */
    @keyframes ejectFall {
      0%   { transform: translateY(0) scale(1);   opacity: 1; }
      100% { transform: translateY(72px) scale(0.4); opacity: 0; }
    }

    .eject-ghost {
      position: fixed;
      pointer-events: none;
      z-index: 50;
      border-radius: 50%;
      animation: ejectFall 0.38s ease-in forwards;
    }

    /* ── First player toast ── */
    .first-toast {
      font-size: 0.88rem;
      color: rgba(255,255,255,0.9);
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(8px);
      border-radius: 50px;
      padding: 5px 18px;
      margin-bottom: 10px;
      min-height: 28px;
      text-align: center;
      transition: opacity 0.4s;
    }

    /* ── Mute button ── */
    .mute-btn {
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255,255,255,0.4);
      border-radius: 50px;
      color: #fff;
      font-size: 1rem;
      width: 44px; height: 44px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .mute-btn:hover { background: rgba(255,255,255,0.32); }

    @media (max-width: 500px) {
      h1 { font-size: 1.5rem; }
      .mode-cards { gap: 14px; }
      .mode-card { padding: 24px 20px; min-width: 120px; }
      .mode-icon { font-size: 2.4rem; }
      .size-cards { gap: 10px; }
      .size-card { padding: 16px 12px; min-width: 88px; }
      .size-preview { width: 44px; height: 44px; }
      .diff-cards { max-width: 300px; gap: 10px; }
      .push-btn { height: 34px; font-size: 1.1rem; }
      .board-wrap { padding: 10px; gap: 6px; }
      .timer-wrap { width: 260px; }
      .win-banner { padding: 32px 24px; width: 90vw; }
      .win-title { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

  <canvas id="confettiCanvas" style="position:fixed;top:0;left:0;pointer-events:none;z-index:200;"></canvas>
  <div class="backdrop" id="backdrop"></div>
  <div class="win-banner" id="winBanner">
    <div class="win-emoji" id="winEmoji">🎉</div>
    <div class="win-title" id="winTitle"></div>
    <div class="win-sub"   id="winSub"></div>
    <div class="win-buttons">
      <button class="play-again-btn" onclick="newRound()">もう一度 🔄</button>
      <button class="back-btn" onclick="goToStart()">← モード選択</button>
    </div>
  </div>

  <!-- ① Mode selection -->
  <div id="startScreen">
    <h1>🔴 プッシュ４</h1>
    <p class="tagline">
      ↓ ボタンで列の上からコマを押し込む！<br>
      <span style="font-size:0.85em">一番下のコマは押し出されて消える</span><br>
      <span style="font-size:0.9em">縦・横・斜めどこでも4つ並べたら勝ち！</span>
    </p>
    <div class="mode-cards">
      <button class="card-btn mode-card" onclick="selectMode('2p')">
        <div class="mode-icon">👥</div>
        <div class="mode-name">2人対戦</div>
        <div class="mode-desc">友達と対決</div>
      </button>
      <button class="card-btn mode-card" onclick="selectMode('cpu')">
        <div class="mode-icon">🤖</div>
        <div class="mode-name">CPU対戦</div>
        <div class="mode-desc">AIに挑戦</div>
      </button>
    </div>
  </div>

  <!-- ② Board size selection -->
  <div id="sizeScreen">
    <h1>🔴 プッシュ４</h1>
    <p class="tagline">盤面のサイズを選んでください<br>
      <span style="font-size:0.8em;opacity:0.8">すべて「4つ並べ」で勝利</span>
    </p>
    <div class="size-cards">
      <button class="card-btn size-card" onclick="selectSize(4)">
        <div class="size-preview s4" id="prev4"></div>
        <div class="size-label">4 × 4</div>
        <div class="size-desc">コンパクト</div>
      </button>
      <button class="card-btn size-card" onclick="selectSize(5)">
        <div class="size-preview s5" id="prev5"></div>
        <div class="size-label">5 × 5</div>
        <div class="size-desc">スタンダード</div>
      </button>
      <button class="card-btn size-card" onclick="selectSize(6)">
        <div class="size-preview s6" id="prev6"></div>
        <div class="size-label">6 × 6</div>
        <div class="size-desc">ワイド</div>
      </button>
    </div>
    <button class="back-link" onclick="goToStart()">← モード選択に戻る</button>
  </div>

  <!-- ③ Difficulty selection (CPU only) -->
  <div id="difficultyScreen">
    <h1>🔴 プッシュ４</h1>
    <p class="tagline">CPU の強さを選んでください</p>
    <div class="diff-cards">
      <button class="card-btn diff-card" onclick="startGame('easy')">
        <div class="diff-icon">😊</div>
        <div class="diff-name">かんたん</div>
        <div class="diff-desc">ランダムに動く</div>
      </button>
      <button class="card-btn diff-card" onclick="startGame('normal')">
        <div class="diff-icon">🙂</div>
        <div class="diff-name">ふつう</div>
        <div class="diff-desc">勝てる手を優先</div>
      </button>
      <button class="card-btn diff-card" onclick="startGame('hard')">
        <div class="diff-icon">😤</div>
        <div class="diff-name">むずかしい</div>
        <div class="diff-desc" id="hardDesc">5手先まで読む</div>
      </button>
      <button class="card-btn diff-card diff-max" onclick="startGame('max')">
        <div class="diff-icon">💀</div>
        <div class="diff-name">最強</div>
        <div class="diff-desc" id="maxDesc">8手先・完全読み</div>
      </button>
    </div>
    <button class="back-link" onclick="showSize()">← 盤面選択に戻る</button>
  </div>

  <!-- ④ Game -->
  <div id="gameScreen">
    <h1>🔴 プッシュ４</h1>
    <div class="how-to">
      <b>↓</b> ボタンを押す → 列の上からコマが入り、一番下が押し出される！<br>
      <span style="letter-spacing:0.05em">
        縦・横・斜め、どこでも <b style="color:#ff8a80">4つ並べたら勝ち 🏆</b>
      </span>
    </div>

    <div class="score-wrap">
      <div class="score-card p1-card">
        <div class="s-name">🔴 プレイヤー 1</div>
        <div class="s-num" id="score1">0</div>
      </div>
      <div class="score-card p2-card">
        <div class="s-name" id="p2Label">🟡 プレイヤー 2</div>
        <div class="s-num" id="score2">0</div>
      </div>
    </div>

    <div class="turn-display">
      <div class="turn-piece" id="turnPiece"></div>
      <span id="turnText"></span>
    </div>
    <div class="first-toast" id="firstToast"></div>

    <div class="timer-wrap">
      <div class="timer-bar" id="timerBar"></div>
      <span class="timer-text" id="timerText">20</span>
    </div>

    <div class="board-wrap">
      <div class="push-row" id="pushRow"></div>
      <div class="board"    id="board"></div>
    </div>

    <div class="btn-row">
      <button class="action-btn" onclick="newRound()">🔄 リセット</button>
      <button class="action-btn" onclick="goToStart()">← モード選択</button>
      <button class="mute-btn" id="muteBtn" onclick="toggleMute()" title="消音">🔊</button>
    </div>
  </div>

  <script>
    const TURN_TIME = 20;
    const EMPTY = 0, P1 = 1, P2 = 2;
    const COLOR = { [P1]: '#f44336', [P2]: '#ffeb3b' };
    const NAME  = { [P1]: 'プレイヤー 1', [P2]: 'プレイヤー 2' };
    const EMOJI = { [P1]: '🔴', [P2]: '🟡' };

    // Cell sizes [desktop, mobile] per board size
    const CELL_PX = { 4: [72, 58], 5: [62, 50], 6: [54, 43] };

    const CPU_LEVELS = {
      easy:   { label: 'かんたん', emoji: '😊', delay: 400 },
      normal: { label: 'ふつう',   emoji: '🙂', delay: 600 },
      hard:   { label: 'むずかしい', emoji: '😤', delay: 900 },
      max:    { label: '最強',     emoji: '💀', delay: 1400 },
    };

    // Minimax depth by level and board size
    const DEPTH_TABLE = {
      hard: { 4: 5, 5: 4, 6: 3 },
      max:  { 4: 8, 5: 6, 6: 5 },
    };

    let ROWS, COLS, ALL_LINES;
    let board, current, over, animating;
    let pendingMode = '2p', boardSize = 4;
    let cpuMode = false, cpuLevel = 'normal';
    let timerRAF = null, timerStart = null;
    const scores = { [P1]: 0, [P2]: 0 };

    // ── Line precomputation ───────────────────────────────────────
    function computeLines() {
      const lines = [];
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          for (const [dr, dc] of [[0,1],[1,0],[1,1],[1,-1]]) {
            const line = [];
            for (let i = 0; i < 4; i++) {
              const nr = r + dr*i, nc = c + dc*i;
              if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) break;
              line.push([nr, nc]);
            }
            if (line.length === 4) lines.push(line);
          }
        }
      }
      return lines;
    }

    // ── Cell size ─────────────────────────────────────────────────
    function applySize() {
      const mobile = window.innerWidth <= 500;
      const cell = CELL_PX[boardSize][mobile ? 1 : 0];
      const gap  = mobile ? 7 : 9;
      const root = document.documentElement.style;
      root.setProperty('--cell', `${cell}px`);
      root.setProperty('--gap',  `${gap}px`);
      root.setProperty('--step', `${cell + gap}px`);
    }

    // ── Screen control ────────────────────────────────────────────
    const SCREENS = ['startScreen','sizeScreen','difficultyScreen','gameScreen'];

    function show(id) {
      SCREENS.forEach(s =>
        document.getElementById(s).style.display = s === id ? 'flex' : 'none'
      );
    }

    function goToStart() {
      stopTimer(); stopConfetti();
      document.getElementById('winBanner').classList.remove('show');
      document.getElementById('backdrop').classList.remove('show');
      show('startScreen');
    }

    function selectMode(mode) {
      pendingMode = mode;
      showSize();
    }

    function showSize() {
      // Fill dot previews
      [4, 5, 6].forEach(n => {
        const el = document.getElementById(`prev${n}`);
        el.innerHTML = Array(n * n).fill('<span class="dot"></span>').join('');
      });
      show('sizeScreen');
    }

    function selectSize(n) {
      boardSize = n;
      ROWS = COLS = n;
      ALL_LINES = computeLines();
      applySize();
      // Update depth descriptions
      document.getElementById('hardDesc').textContent = `${DEPTH_TABLE.hard[n]}手先まで読む`;
      document.getElementById('maxDesc').textContent  = `${DEPTH_TABLE.max[n]}手先・完全読み`;
      if (pendingMode === 'cpu') { show('difficultyScreen'); }
      else { startGame('2p'); }
    }

    function startGame(level) {
      cpuMode  = level !== '2p';
      cpuLevel = cpuMode ? level : 'normal';
      scores[P1] = scores[P2] = 0;
      document.getElementById('score1').textContent = '0';
      document.getElementById('score2').textContent = '0';
      const cfg = CPU_LEVELS[cpuLevel];
      document.getElementById('p2Label').textContent =
        cpuMode ? `🤖 CPU (${cfg.label})` : '🟡 プレイヤー 2';
      show('gameScreen');
      buildDOM();
      newRound();
    }

    // ── Build board DOM ───────────────────────────────────────────
    function buildDOM() {
      const pushRow = document.getElementById('pushRow');
      const boardEl = document.getElementById('board');
      pushRow.innerHTML = '';
      boardEl.innerHTML = '';

      for (let c = 0; c < COLS; c++) {
        const btn = document.createElement('button');
        btn.className = 'push-btn';
        btn.id = `pb${c}`;
        btn.textContent = '↓';
        btn.onclick = () => push(c);
        pushRow.appendChild(btn);

        const wrap  = document.createElement('div');
        wrap.className = 'col-wrap';
        const inner = document.createElement('div');
        inner.className = 'col-inner';
        inner.id = `col${c}`;
        for (let r = 0; r < ROWS; r++) {
          const div = document.createElement('div');
          div.className = 'cell';
          div.id = `c${r}-${c}`;
          inner.appendChild(div);
        }
        wrap.appendChild(inner);
        boardEl.appendChild(wrap);
      }
    }

    // ── Cell helpers ──────────────────────────────────────────────
    function cellEl(r, c) { return document.getElementById(`c${r}-${c}`); }

    function renderCell(r, c) {
      const el = cellEl(r, c);
      el.className = 'cell';
      if      (board[r][c] === P1) el.classList.add('p1');
      else if (board[r][c] === P2) el.classList.add('p2');
    }

    // ── Push logic ────────────────────────────────────────────────
    function push(col) {
      if (over || animating) return;
      animating = true;
      stopTimer();
      lockButtons(true);

      // Animate ejected piece before board update
      const ejected = board[ROWS - 1][col];
      if (ejected) animateEject(col, ejected);

      playPush();

      for (let r = ROWS - 1; r > 0; r--) board[r][col] = board[r - 1][col];
      board[0][col] = current;
      for (let r = 0; r < ROWS; r++) renderCell(r, col);

      const colEl = document.getElementById(`col${col}`);
      colEl.classList.add('anim-down');
      colEl.addEventListener('animationend', () => {
        colEl.classList.remove('anim-down');
        animating = false;

        const win = checkWin();
        if (win) {
          over = true;
          scores[current]++;
          document.getElementById(`score${current}`).textContent = scores[current];
          win.forEach(([r, c]) => cellEl(r, c).classList.add('win'));
          setTimeout(() => showWinBanner(current), 400);
          return;
        }

        current = current === P1 ? P2 : P1;
        updateTurn();
        lockButtons(false);

        if (cpuMode && current === P2) {
          showCPUThinking();
          setTimeout(doCPUMove, CPU_LEVELS[cpuLevel].delay);
        } else {
          startTimer();
        }
      }, { once: true });
    }

    // ── Timer ─────────────────────────────────────────────────────
    function startTimer() {
      stopTimer();
      timerStart = Date.now();
      timerRAF = requestAnimationFrame(tickTimer);
    }

    function stopTimer() {
      if (timerRAF) cancelAnimationFrame(timerRAF);
      timerRAF = null; timerStart = null;
    }

    function tickTimer() {
      const remaining = Math.max(0, TURN_TIME - (Date.now() - timerStart) / 1000);
      const bar = document.getElementById('timerBar');
      const txt = document.getElementById('timerText');
      bar.style.width = `${(remaining / TURN_TIME) * 100}%`;
      txt.textContent = Math.ceil(remaining);
      bar.className = 'timer-bar';
      if (remaining <= 5)      bar.classList.add('danger');
      else if (remaining <= 8) bar.classList.add('warning');

      if (remaining <= 0) { stopTimer(); autoRandomPush(); return; }
      timerRAF = requestAnimationFrame(tickTimer);
    }

    function autoRandomPush() {
      if (animating) { setTimeout(autoRandomPush, 100); return; }
      push(Math.floor(Math.random() * COLS));
    }

    function showCPUThinking() {
      const bar = document.getElementById('timerBar');
      const txt = document.getElementById('timerText');
      bar.className = 'timer-bar cpu';
      bar.style.width = '100%';
      txt.textContent = `${CPU_LEVELS[cpuLevel].emoji} CPU が考え中…`;
    }

    // ── CPU logic ─────────────────────────────────────────────────
    function doCPUMove() { if (!over) push(cpuPickCol()); }

    function cpuPickCol() {
      if (cpuLevel === 'easy') return randCol();

      const cols = shuffled();
      if (cpuLevel === 'normal') {
        for (const c of cols) if (checkWinOnBoard(simulatePush(board, c, P2), P2)) return c;
        for (const c of cols) if (checkWinOnBoard(simulatePush(board, c, P1), P1)) return c;
        return cols[0];
      }

      const depth = DEPTH_TABLE[cpuLevel][boardSize];
      let best = -Infinity, bestCol = cols[0];
      for (const c of cols) {
        const score = minimax(simulatePush(board, c, P2), depth - 1, -Infinity, Infinity, false);
        if (score > best) { best = score; bestCol = c; }
      }
      return bestCol;
    }

    function minimax(b, depth, alpha, beta, isMax) {
      if (checkWinOnBoard(b, P2)) return 10000 + depth;
      if (checkWinOnBoard(b, P1)) return -10000 - depth;
      if (depth === 0) return evalBoard(b);

      const player = isMax ? P2 : P1;
      let best = isMax ? -Infinity : Infinity;

      for (const c of shuffled()) {
        const score = minimax(simulatePush(b, c, player), depth - 1, alpha, beta, !isMax);
        if (isMax) { best = Math.max(best, score); alpha = Math.max(alpha, best); }
        else        { best = Math.min(best, score); beta  = Math.min(beta,  best); }
        if (beta <= alpha) break;
      }
      return best;
    }

    function evalBoard(b) {
      let score = 0;
      for (const line of ALL_LINES) {
        let p1 = 0, p2 = 0;
        for (const [r, c] of line) {
          if (b[r][c] === P1) p1++;
          else if (b[r][c] === P2) p2++;
        }
        if (p1 === 0 && p2 > 0) score += p2 === 3 ? 500 : p2 === 2 ? 20 : 1;
        if (p2 === 0 && p1 > 0) score -= p1 === 3 ? 500 : p1 === 2 ? 20 : 1;
      }
      return score;
    }

    function simulatePush(b, col, player) {
      const copy = b.map(r => [...r]);
      for (let r = ROWS - 1; r > 0; r--) copy[r][col] = copy[r - 1][col];
      copy[0][col] = player;
      return copy;
    }

    function checkWinOnBoard(b, player = null) {
      const targets = player ? [player] : [P1, P2];
      for (const p of targets)
        for (const line of ALL_LINES)
          if (line.every(([r, c]) => b[r][c] === p)) return true;
      return false;
    }

    function checkWin() {
      for (const line of ALL_LINES) {
        const p = board[line[0][0]][line[0][1]];
        if (p && line.every(([r, c]) => board[r][c] === p)) return line;
      }
      return null;
    }

    function shuffled() { return [0,1,2,3,4,5].slice(0, COLS).sort(() => Math.random() - 0.5); }
    function randCol()   { return Math.floor(Math.random() * COLS); }

    // ── New round ─────────────────────────────────────────────────
    function newRound() {
      stopTimer();
      board     = Array.from({length: ROWS}, () => Array(COLS).fill(EMPTY));
      current   = Math.random() < 0.5 ? P1 : P2;
      over      = false;
      animating = false;
      document.getElementById('winBanner').classList.remove('show');
      document.getElementById('backdrop').classList.remove('show');
      stopConfetti();
      for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++) renderCell(r, c);
      updateTurn();
      lockButtons(false);
      showFirstToast();
    }

    function showFirstToast() {
      const toast = document.getElementById('firstToast');
      const isCPU = cpuMode && current === P2;
      const name  = isCPU ? `🤖 CPU (${CPU_LEVELS[cpuLevel].label})` : `${EMOJI[current]} ${NAME[current]}`;
      toast.textContent = `先攻：${name}`;
      toast.style.opacity = '1';
      setTimeout(() => { toast.style.opacity = '0'; }, 2500);
      if (isCPU) {
        lockButtons(true);
        showCPUThinking();
        setTimeout(doCPUMove, CPU_LEVELS[cpuLevel].delay);
      } else {
        startTimer();
      }
    }

    // ── UI helpers ────────────────────────────────────────────────
    function updateTurn() {
      const cls = current === P1 ? 'p1-style' : 'p2-style';
      document.querySelectorAll('.push-btn').forEach(b => b.className = `push-btn ${cls}`);
      document.getElementById('turnPiece').style.background = COLOR[current];
      const label = cpuMode && current === P2
        ? `${CPU_LEVELS[cpuLevel].emoji} CPU のターン`
        : `${NAME[current]} のターン`;
      document.getElementById('turnText').textContent = label;
    }

    function lockButtons(lock) {
      document.querySelectorAll('.push-btn').forEach(b => b.disabled = lock);
    }

    function showWinBanner(p) {
      const isCPU = cpuMode && p === P2;
      document.getElementById('winEmoji').textContent = isCPU ? CPU_LEVELS[cpuLevel].emoji : EMOJI[p];
      document.getElementById('winTitle').textContent =
        isCPU ? `CPU (${CPU_LEVELS[cpuLevel].label}) の勝ち！` : `${NAME[p]} の勝ち！`;
      document.getElementById('winSub').textContent =
        isCPU ? '手強かった！また挑戦しよう 💪' : 'おめでとう！🎊';
      document.getElementById('winBanner').classList.add('show');
      document.getElementById('backdrop').classList.add('show');
      launchConfetti(COLOR[p]);
      playWin();
    }

    // ── Confetti ──────────────────────────────────────────────────
    const canvas = document.getElementById('confettiCanvas');
    const ctx    = canvas.getContext('2d');
    let particles = [], rafId = null;

    function launchConfetti(base) {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
      const palette = [base, '#fff', '#ffd700', '#ff6b6b', '#00ffb4', '#a78bfa'];
      particles = Array.from({length: 100}, () => ({
        x: Math.random() * canvas.width,
        y: -20 - Math.random() * 100,
        w: Math.random() * 10 + 5, h: Math.random() * 6 + 3,
        color: palette[Math.floor(Math.random() * palette.length)],
        vy: Math.random() * 2 + 2, vx: (Math.random() - 0.5) * 2,
        rot: Math.random() * 360, rotSpeed: (Math.random() - 0.5) * 6,
      }));
      if (rafId) cancelAnimationFrame(rafId);
      animConfetti();
    }

    function animConfetti() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        ctx.save();
        ctx.translate(p.x + p.w/2, p.y + p.h/2);
        ctx.rotate(p.rot * Math.PI / 180);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
        ctx.restore();
        p.y += p.vy; p.x += p.vx; p.rot += p.rotSpeed;
      });
      particles = particles.filter(p => p.y < canvas.height);
      if (particles.length > 0) rafId = requestAnimationFrame(animConfetti);
    }

    function stopConfetti() {
      if (rafId) cancelAnimationFrame(rafId);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles = [];
    }

    // ── Sound (Web Audio API) ─────────────────────────────────────
    let audioCtx = null, muted = false;

    function getAudio() {
      if (!audioCtx) audioCtx = new AudioContext();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }

    function playPush() {
      if (muted) return;
      const ac = getAudio();
      const osc  = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(280, ac.currentTime);
      osc.frequency.exponentialRampToValueAtTime(90, ac.currentTime + 0.1);
      gain.gain.setValueAtTime(0.18, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.14);
      osc.start(ac.currentTime);
      osc.stop(ac.currentTime + 0.14);
    }

    function playWin() {
      if (muted) return;
      const ac = getAudio();
      [[523, 0], [659, 0.1], [784, 0.2], [1047, 0.32], [1319, 0.44]].forEach(([freq, t]) => {
        const osc  = ac.createOscillator();
        const gain = ac.createGain();
        osc.connect(gain);
        gain.connect(ac.destination);
        osc.type = 'triangle';
        osc.frequency.value = freq;
        const st = ac.currentTime + t;
        gain.gain.setValueAtTime(0.22, st);
        gain.gain.exponentialRampToValueAtTime(0.001, st + 0.28);
        osc.start(st);
        osc.stop(st + 0.28);
      });
    }

    function toggleMute() {
      muted = !muted;
      document.getElementById('muteBtn').textContent = muted ? '🔇' : '🔊';
    }

    // ── Eject animation ───────────────────────────────────────────
    function animateEject(col, player) {
      const el   = cellEl(ROWS - 1, col);
      const rect = el.getBoundingClientRect();
      const ghost = document.createElement('div');
      ghost.className = `eject-ghost ${player === P1 ? 'p1' : 'p2'}`;
      ghost.style.left   = `${rect.left}px`;
      ghost.style.top    = `${rect.top}px`;
      ghost.style.width  = `${rect.width}px`;
      ghost.style.height = `${rect.height}px`;
      document.body.appendChild(ghost);
      ghost.addEventListener('animationend', () => ghost.remove(), { once: true });
    }

    // ── Start ─────────────────────────────────────────────────────
    show('startScreen');
  </script>
</body>
</html>
