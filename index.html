<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>虎の巻 クイズアプリ</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
      background: #0d1117;
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      color: #e6edf3;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 20%, rgba(0,255,180,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 35% at 80% 80%, rgba(88,166,255,0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    .quiz-card {
      position: relative;
      width: min(720px, 100%);
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 36px 44px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }

    /* ── Header ── */
    .quiz-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .quiz-title {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #00ffb4;
    }

    .progress-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      visibility: hidden;
    }

    .progress-label { font-size: 0.75rem; color: #8b949e; }

    .progress-bar-bg {
      width: 120px;
      height: 6px;
      background: #21262d;
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #00ffb4, #58a6ff);
      border-radius: 99px;
      transition: width 0.4s ease;
      width: 0%;
    }

    /* ── Start Screen ── */
    .start-lead {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .start-sub {
      font-size: 0.85rem;
      color: #8b949e;
      margin-bottom: 28px;
    }

    .start-sub code {
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 0.8rem;
      color: #00ffb4;
      font-family: 'Consolas', 'Monaco', monospace;
    }

    .filter-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #8b949e;
      margin-bottom: 12px;
    }

    .filter-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 32px;
    }

    .filter-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 12px 20px;
      min-width: 100px;
      background: #21262d;
      border: 2px solid #30363d;
      border-radius: 12px;
      color: #8b949e;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
    }

    .filter-btn .f-count { font-size: 0.72rem; font-weight: 400; opacity: 0.7; }
    .filter-btn:hover { border-color: #58a6ff; color: #e6edf3; }
    .filter-btn.active { color: #0d1117; }

    .filter-btn[data-cat="all"].active        { background: linear-gradient(135deg,#00ffb4,#58a6ff); border-color: transparent; }
    .filter-btn[data-cat="コマンド"].active   { background: #e3b341; border-color: #e3b341; }
    .filter-btn[data-cat="Git"].active        { background: #bc8cff; border-color: #bc8cff; }
    .filter-btn[data-cat="言語の違い"].active { background: #58a6ff; border-color: #58a6ff; }
    .filter-btn[data-cat="Web基礎"].active    { background: #3fb950; border-color: #3fb950; }
    .filter-btn[data-cat="npm"].active        { background: #f85149; border-color: #f85149; }
    .filter-btn[data-cat="データ管理"].active { background: #00b4d8; border-color: #00b4d8; }
    .filter-btn[data-cat="PWA"].active        { background: #f0883e; border-color: #f0883e; }

    .start-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #00ffb4 0%, #58a6ff 100%);
      border: none;
      border-radius: 12px;
      font-size: 1.05rem;
      font-weight: 700;
      color: #0d1117;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.04em;
    }

    .start-btn:hover { opacity: 0.9; transform: translateY(-1px); }

    /* ── Category Badge ── */
    .category-badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      padding: 3px 10px;
      border-radius: 99px;
      margin-bottom: 12px;
      background: rgba(88,166,255,0.15);
      border: 1px solid rgba(88,166,255,0.35);
      color: #58a6ff;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }

    .category-badge[data-cat="コマンド"]   { background: rgba(227,179,65,0.15);  border-color: rgba(227,179,65,0.35);  color: #e3b341; }
    .category-badge[data-cat="Git"]        { background: rgba(188,140,255,0.15); border-color: rgba(188,140,255,0.35); color: #bc8cff; }
    .category-badge[data-cat="言語の違い"] { background: rgba(88,166,255,0.15);  border-color: rgba(88,166,255,0.35);  color: #58a6ff; }
    .category-badge[data-cat="Web基礎"]   { background: rgba(63,185,80,0.15);   border-color: rgba(63,185,80,0.35);   color: #3fb950; }
    .category-badge[data-cat="npm"]        { background: rgba(248,81,73,0.15);   border-color: rgba(248,81,73,0.35);   color: #f85149; }
    .category-badge[data-cat="データ管理"] { background: rgba(0,180,216,0.15);   border-color: rgba(0,180,216,0.35);   color: #00b4d8; }
    .category-badge[data-cat="PWA"]       { background: rgba(240,136,62,0.15);  border-color: rgba(240,136,62,0.35);  color: #f0883e; }

    /* ── Question ── */
    .question-number {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.75rem;
      color: #8b949e;
      margin-bottom: 8px;
    }

    .difficulty-stars { letter-spacing: 0.05em; font-size: 0.82rem; }
    .difficulty-stars.d1 { color: #3fb950; }
    .difficulty-stars.d2 { color: #e3b341; }
    .difficulty-stars.d3 { color: #f85149; }

    .question-text {
      font-size: 1.25rem;
      font-weight: 600;
      line-height: 1.7;
      color: #e6edf3;
      margin-bottom: 28px;
      min-height: 3.5rem;
    }

    .question-text code {
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 1rem;
      font-family: 'Consolas', 'Monaco', monospace;
      color: #e6edf3;
    }

    /* ── Tooltip Terms ── */
    .term {
      border-bottom: 1px dashed #58a6ff;
      color: #58a6ff;
      cursor: help;
    }

    code.term {
      color: #00ffb4;
      border-bottom: 1px dashed #00ffb4;
    }

    /* ── Choices ── */
    .choices { display: flex; flex-direction: column; gap: 10px; }

    .choice-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 13px 18px;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 10px;
      color: #c9d1d9;
      font-size: 0.95rem;
      font-family: inherit;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.15s, background 0.15s, color 0.15s, transform 0.1s;
    }

    .choice-btn:hover:not(:disabled) {
      border-color: #58a6ff;
      background: #1c2128;
      color: #e6edf3;
      transform: translateX(3px);
    }

    .choice-btn .choice-label {
      flex-shrink: 0;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #30363d;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      color: #8b949e;
      transition: background 0.15s, color 0.15s;
    }

    .choice-btn.selected { border-color: #58a6ff; background: rgba(88,166,255,0.12); color: #58a6ff; }
    .choice-btn.selected .choice-label { background: #58a6ff; color: #0d1117; }
    .choice-btn.correct { border-color: #00ffb4; background: rgba(0,255,180,0.1); color: #00ffb4; }
    .choice-btn.correct .choice-label { background: #00ffb4; color: #0d1117; }
    .choice-btn.wrong   { border-color: #f85149; background: rgba(248,81,73,0.1); color: #f85149; }
    .choice-btn.wrong   .choice-label { background: #f85149; color: #fff; }
    .choice-btn:disabled { cursor: not-allowed; }

    /* ── Confirm Button ── */
    .confirm-btn {
      display: none;
      width: 100%;
      margin-top: 10px;
      padding: 14px;
      background: #58a6ff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      color: #0d1117;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.04em;
    }
    .confirm-btn.show { display: block; }
    .confirm-btn:hover { opacity: 0.9; transform: translateY(-1px); }

    /* ── Quiz Top Row (back btn + badge) ── */
    .quiz-top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .back-btn {
      font-size: 0.8rem;
      font-weight: 600;
      color: #8b949e;
      background: transparent;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 5px 12px;
      cursor: pointer;
      font-family: inherit;
      transition: color 0.15s, border-color 0.15s;
    }
    .back-btn:hover { color: #e6edf3; border-color: #8b949e; }

    /* ── Feedback ── */
    .feedback {
      margin-top: 20px;
      padding: 14px 18px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      display: none;
      align-items: flex-start;
      gap: 10px;
    }

    .feedback.show { display: flex; }
    .feedback.correct-fb { background: rgba(0,255,180,0.12); border: 1px solid rgba(0,255,180,0.4); color: #00ffb4; }
    .feedback.wrong-fb   { background: rgba(248,81,73,0.12);  border: 1px solid rgba(248,81,73,0.4);  color: #f85149; }
    .feedback .fb-icon   { font-size: 1.3rem; flex-shrink: 0; margin-top: 1px; }
    .feedback .fb-text   { flex: 1; }
    .feedback .fb-hint   { font-size: 0.82rem; font-weight: 400; color: #8b949e; margin-top: 4px; }

    /* ── Next Button ── */
    .next-btn {
      display: none;
      flex: 1;
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #00ffb4 0%, #58a6ff 100%);
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      color: #0d1117;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.04em;
    }

    .next-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .next-btn.show  { display: block; }

    /* ── Result ── */
    .result-screen { display: none; text-align: center; }
    .result-screen.show { display: block; }
    .result-emoji  { font-size: 4rem; margin-bottom: 16px; }

    .result-title {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #00ffb4, #58a6ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .result-score { font-size: 1.1rem; color: #8b949e; margin-bottom: 32px; }
    .result-score strong { font-size: 2rem; color: #e6edf3; -webkit-text-fill-color: #e6edf3; }

    .result-buttons { display: flex; gap: 12px; justify-content: center; }

    .restart-btn, .change-cat-btn {
      padding: 14px 28px;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    .restart-btn    { background: linear-gradient(135deg,#00ffb4,#58a6ff); color: #0d1117; }
    .change-cat-btn { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; }
    .restart-btn:hover, .change-cat-btn:hover { opacity: 0.9; transform: translateY(-1px); }

    /* ── Tooltip Bubble ── */
    .tooltip-bubble {
      position: fixed;
      z-index: 9999;
      max-width: min(260px, calc(100vw - 24px));
      padding: 10px 14px;
      background: #1c2128;
      border: 1px solid #58a6ff;
      border-radius: 8px;
      font-size: 0.82rem;
      line-height: 1.5;
      color: #c9d1d9;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.12s;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }

    .tooltip-bubble.visible { opacity: 1; }

    @media (max-width: 520px) {
      .quiz-card { padding: 24px 18px; }
      .question-text { font-size: 1.1rem; }
      .filter-btn { min-width: 80px; padding: 10px 14px; }
      .result-buttons { flex-direction: column; }
      .wl-item { grid-template-columns: 1fr; gap: 3px; }
      .action-row { flex-direction: column; }
    }

    /* ── Word List ── */
    .word-list-toggle {
      width: 100%;
      margin-top: 14px;
      padding: 12px;
      background: transparent;
      border: 1px dashed #30363d;
      border-radius: 10px;
      color: #8b949e;
      font-size: 0.88rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      letter-spacing: 0.03em;
      text-align: center;
    }
    .word-list-toggle:hover { border-color: #58a6ff; color: #58a6ff; }

    .word-list-section {
      margin-top: 14px;
      border: 1px solid #21262d;
      border-radius: 12px;
      overflow: hidden;
    }

    .wl-cat-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: #1c2128;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-bottom: 1px solid #21262d;
    }

    .wl-item {
      display: grid;
      grid-template-columns: minmax(90px, 150px) 1fr;
      gap: 12px;
      align-items: start;
      padding: 9px 16px;
      border-bottom: 1px solid #21262d;
      font-size: 0.83rem;
      line-height: 1.5;
      transition: background 0.1s;
    }
    .wl-item:last-child { border-bottom: none; }
    .wl-item:hover { background: rgba(255,255,255,0.03); }
    .wl-term {
      font-family: 'Consolas','Monaco',monospace;
      color: #e6edf3;
      font-weight: 600;
      font-size: 0.8rem;
      padding-top: 1px;
    }
    .wl-def { color: #8b949e; }

    /* ── Action Row (retry + next) ── */
    .action-row { display: flex; gap: 10px; margin-top: 16px; }

    .retry-btn {
      display: none;
      flex: 1;
      padding: 14px;
      background: transparent;
      border: 1px solid #f85149;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      color: #f85149;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: 0.04em;
    }
    .retry-btn:hover { background: rgba(248,81,73,0.1); transform: translateY(-1px); }
    .retry-btn.show  { display: block; }
  </style>
</head>
<body>

  <div class="tooltip-bubble" id="tooltipBubble"></div>

  <div class="quiz-card">

    <div class="quiz-header">
      <span class="quiz-title">🐯 虎の巻 Quiz</span>
      <div class="progress-wrap" id="progressWrap">
        <span class="progress-label" id="progressLabel">1 / 10</span>
        <div class="progress-bar-bg">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>
    </div>

    <!-- Start Screen -->
    <div id="startScreen">
      <div class="start-lead">カテゴリを選んでスタート！</div>
      <div class="start-sub">問題中の用語を <code>タップ / ホバー</code> すると意味が表示されます 💡</div>
      <div class="filter-label">カテゴリを選択</div>
      <div class="filter-grid" id="filterGrid"></div>
      <button class="start-btn" onclick="startQuiz()">スタートする →</button>
      <button class="word-list-toggle" id="wordListToggle" onclick="toggleWordList()">📚 単語リストを確認する ▾</button>
      <div class="word-list-section" id="wordListSection" style="display:none"></div>
    </div>

    <!-- Quiz Body -->
    <div id="quizBody" style="display:none">
      <div class="quiz-top-row">
        <button class="back-btn" onclick="backToTop()">← トップへ</button>
        <div class="category-badge" id="categoryBadge"></div>
      </div>
      <div class="question-number" id="questionNumber"></div>
      <div class="question-text" id="questionText"></div>
      <div class="choices" id="choicesContainer"></div>
      <button class="confirm-btn" id="confirmBtn" onclick="confirmAnswer()">この答えで確定する →</button>
      <div class="feedback" id="feedback">
        <span class="fb-icon" id="fbIcon"></span>
        <div class="fb-text">
          <div id="fbMain"></div>
          <div class="fb-hint" id="fbHint"></div>
        </div>
      </div>
      <div class="action-row">
        <button class="retry-btn" id="retryBtn" onclick="retryQuestion()">もう一度挑戦 🔄</button>
        <button class="next-btn" id="nextBtn" onclick="nextQuestion()"></button>
      </div>
    </div>

    <!-- Result Screen -->
    <div class="result-screen" id="resultScreen">
      <div class="result-emoji" id="resultEmoji"></div>
      <div class="result-title" id="resultTitle"></div>
      <div class="result-score" id="resultScore"></div>
      <div class="result-buttons">
        <button class="change-cat-btn" onclick="showScreen('start')">カテゴリ変更</button>
        <button class="restart-btn"    onclick="startQuiz()">もう一度 🔄</button>
      </div>
    </div>

  </div>

  <script>
    // ── Glossary ──────────────────────────────────────────────────
    const GLOSSARY = {
      'cd':               'Change Directory。ターミナルで作業ディレクトリを移動するコマンド。',
      'mkdir':            'make directory。新しいディレクトリを作成するコマンド。',
      'pwd':              'print working directory。現在のディレクトリのフルパスを表示するコマンド。',
      'ls':               'list。カレントディレクトリのファイル・フォルダ一覧を表示するコマンド。',
      'rm':               'remove。ファイルやディレクトリを削除するコマンド。元に戻せないので注意！',
      'touch':            '空のファイルを新規作成するコマンド。既存ファイルのタイムスタンプ更新にも使う。',
      'cat':              'concatenate。ファイルの内容をターミナルに表示するコマンド。',
      'cp':               'copy。ファイルをコピーするコマンド。',
      'mv':               'move。ファイルを移動またはリネームするコマンド。',
      'git':              '分散型バージョン管理システム。ファイルの変更履歴を管理・記録するツール。',
      'git init':         'カレントディレクトリを Git リポジトリとして初期化するコマンド。',
      'git add':          '変更ファイルをステージングエリアに追加するコマンド。',
      'git commit':       'ステージングした変更をリポジトリに記録するコマンド。',
      'git push':         'ローカルのコミットをリモートリポジトリに送信するコマンド。',
      'git pull':         'リモートリポジトリの変更をローカルに取得・統合するコマンド。',
      'git status':       '作業ツリーの変更状態を確認するコマンド。',
      'git log':          'コミット履歴の一覧を表示するコマンド。',
      'git clone':        'リモートリポジトリをローカルにコピーするコマンド。',
      'リポジトリ':       'ファイルや変更履歴を保存・管理する場所。ローカルとリモートの2種類がある。',
      'ステージングエリア': 'コミット前に変更を一時的に登録しておく準備ゾーン（舞台袖のイメージ）。',
      'ブランチ':         '開発の作業ラインを分岐させる機能。本流（main）を壊さず並行作業できる。',
      'npm':              'Node Package Manager。Node.js のパッケージ（ライブラリ）を管理するツール。',
      'Node.js':          'JavaScript をブラウザ外（サーバーサイドなど）で実行できる環境。',
      'JavaScript':       'ブラウザで動作するプログラミング言語。Node.js でサーバーサイドにも使える。',
      'Java':             'Sun Microsystems（現Oracle）が開発した汎用プログラミング言語。',
      'HTML':             'HyperText Markup Language。Webページの構造（骨格）を作るマークアップ言語。',

    // ── Word List Groups ──────────────────────────────────────────
    const WORD_LIST_GROUPS = [
      { cat: 'コマンド', color: '#e3b341', terms: ['cd','mkdir','pwd','ls','rm','touch','cat','cp','mv'] },
      { cat: 'Git',      color: '#bc8cff', terms: ['git','git init','git add','git commit','git push','git pull','git status','git log','git clone','リポジトリ','ステージングエリア','ブランチ','git remote'] },

      { cat: 'Web基礎',  color: '#3fb950', terms: ['HTML','CSS','HTTP','HTTPS','GitHub Pages','静的サイト','動的サイト','Canvas'] },
      { cat: 'npm',        color: '#f85149', terms: ['npm','package.json','node_modules'] },
      { cat: 'データ管理', color: '#00b4d8', terms: ['データベース','GitHub','Firebase','Firestore','localStorage','SessionStorage','ITP','OAuth','セキュリティルール','Firebase CLI','firebase deploy','firebase serve'] },

    // ── State ─────────────────────────────────────────────────────
    let questions = [], currentIndex = 0, score = 0, answered = false, selectedCategory = 'all', retriedCurrent = false, selectedIdx = -1;

    // ── Utils ─────────────────────────────────────────────────────
    const shuffle = arr => [...arr].sort(() => Math.random() - 0.5);

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function escapeAttr(s) {
      return s.replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    // ── Screen ────────────────────────────────────────────────────
    function showScreen(name) {
      document.getElementById('startScreen').style.display  = name === 'start'  ? '' : 'none';
      document.getElementById('quizBody').style.display     = name === 'quiz'   ? '' : 'none';
      document.getElementById('resultScreen').classList.toggle('show', name === 'result');
      document.getElementById('progressWrap').style.visibility = name === 'quiz' ? 'visible' : 'hidden';
    }

    // ── Filter Grid ───────────────────────────────────────────────
    const CATS = [
      { key: 'all',        label: 'すべて' },
      { key: 'コマンド',   label: 'コマンド' },
      { key: 'Git',        label: 'Git' },
      { key: '言語の違い', label: '言語の違い' },
      { key: 'Web基礎',    label: 'Web 基礎' },
      { key: 'npm',        label: 'npm' },
      { key: 'データ管理', label: 'データ管理' },
      { key: 'PWA',        label: 'PWA' },
    ];

    function initFilterGrid() {
      const grid = document.getElementById('filterGrid');
      CATS.forEach(({ key, label }) => {
        const count = key === 'all' ? ALL_QUESTIONS.length : ALL_QUESTIONS.filter(q => q.category === key).length;
        const btn = document.createElement('button');
        btn.className = 'filter-btn' + (key === selectedCategory ? ' active' : '');
        btn.dataset.cat = key;
        btn.innerHTML = `<span>${label}</span><span class="f-count">${count}問</span>`;
        btn.onclick = () => {
          selectedCategory = key;
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
        };
        grid.appendChild(btn);
      });
    }

    // ── Text Rendering (tooltips) ─────────────────────────────────
    function renderText(raw) {
      return raw.split(/`([^`]+)`/).map((part, i) => {
        if (i % 2 === 0) {
          return escapeHtml(part).replace(/\[\[([^\]]+)\]\]/g, (_, term) => {
            const def = GLOSSARY[term];
            return def
              ? `<span class="term" data-def="${escapeAttr(def)}">${escapeHtml(term)}</span>`
              : escapeHtml(term);
          });
        }
        const def = GLOSSARY[part];
        return def
          ? `<code class="term" data-def="${escapeAttr(def)}">${escapeHtml(part)}</code>`
          : `<code>${escapeHtml(part)}</code>`;
      }).join('');
    }

    // ── Tooltip ───────────────────────────────────────────────────
    const tipEl = document.getElementById('tooltipBubble');
    let tipTarget = null;
    let pinnedTip = null;

    function showTip(term, x, y) {
      tipEl.textContent = term.dataset.def || '';
      tipEl.style.left = x + 'px';
      tipEl.style.top  = y + 'px';
      tipEl.classList.add('visible');
    }

    function hideTip() {
      tipTarget = null;
      pinnedTip = null;
      tipEl.classList.remove('visible');
    }

    // Desktop: hover
    document.addEventListener('mouseover', e => {
      if (pinnedTip) return;
      const term = e.target.closest('.term');
      if (!term) return;
      tipTarget = term;
      tipEl.textContent = term.dataset.def || '';
      tipEl.classList.add('visible');
    });

    document.addEventListener('mouseout', e => {
      if (pinnedTip) return;
      const term = e.target.closest('.term');
      if (!term) return;
      if (!e.relatedTarget || !term.contains(e.relatedTarget)) {
        tipTarget = null;
        tipEl.classList.remove('visible');
      }
    });

    document.addEventListener('mousemove', e => {
      if (!tipTarget || pinnedTip) return;
      const tw = tipEl.offsetWidth || 260, th = tipEl.offsetHeight || 60;
      const x = Math.min(e.clientX + 14, window.innerWidth - tw - 8);
      const y = e.clientY - th - 10 < 8 ? e.clientY + 22 : e.clientY - th - 10;
      tipEl.style.left = x + 'px';
      tipEl.style.top  = y + 'px';
    });

    // Mobile: tap to show / tap again or tap outside to hide
    document.addEventListener('click', e => {
      const term = e.target.closest('.term');
      if (term) {
        e.stopPropagation();
        if (pinnedTip === term) { hideTip(); return; }
        pinnedTip = term;
        tipTarget = null;
        const rect = term.getBoundingClientRect();
        const tw = tipEl.offsetWidth || 260, th = tipEl.offsetHeight || 60;
        const x = Math.min(Math.max(rect.left, 8), window.innerWidth - tw - 8);
        const y = rect.top - th - 10 < 8 ? rect.bottom + 8 : rect.top - th - 10;
        showTip(term, x, y);
      } else if (pinnedTip) {
        hideTip();
      }
    });

    // ── Word List ─────────────────────────────────────────────────
    function buildWordList() {
      const section = document.getElementById('wordListSection');
      section.innerHTML = '';
      WORD_LIST_GROUPS.forEach(({ cat, color, terms }) => {
        const header = document.createElement('div');
        header.className = 'wl-cat-header';
        header.style.color = color;
        header.textContent = cat;
        section.appendChild(header);
        terms.forEach(term => {
          const def = GLOSSARY[term];
          if (!def) return;
          const row = document.createElement('div');
          row.className = 'wl-item';
          row.innerHTML = `<span class="wl-term">${escapeHtml(term)}</span><span class="wl-def">${escapeHtml(def)}</span>`;
          section.appendChild(row);
        });
      });
    }

    let wordListOpen = false;
    function toggleWordList() {
      wordListOpen = !wordListOpen;
      document.getElementById('wordListSection').style.display = wordListOpen ? '' : 'none';
      document.getElementById('wordListToggle').textContent =
        wordListOpen ? '📚 単語リストを閉じる ▴' : '📚 単語リストを確認する ▾';
    }

    // ── Retry ─────────────────────────────────────────────────────
    function retryQuestion() {
      retriedCurrent = true;
      renderQuestion();
    }

    // ── Choice Selection & Confirmation ───────────────────────────
    function selectChoice(idx) {
      if (answered) return;
      selectedIdx = idx;
      document.querySelectorAll('.choice-btn').forEach((btn, i) => {
        btn.classList.toggle('selected', i === idx);
      });
      document.getElementById('confirmBtn').classList.add('show');
    }

    function confirmAnswer() {
      if (selectedIdx < 0 || answered) return;
      document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
      document.getElementById('confirmBtn').classList.remove('show');
      selectAnswer(selectedIdx);
    }

    function backToTop() {
      retriedCurrent = false;
      showScreen('start');
    }

    // ── Quiz Flow ─────────────────────────────────────────────────
    function startQuiz() {
      const pool = selectedCategory === 'all'
        ? ALL_QUESTIONS
        : ALL_QUESTIONS.filter(q => q.category === selectedCategory);
      questions = shuffle(pool).slice(0, Math.min(10, pool.length));
      currentIndex = 0;
      score = 0;
      retriedCurrent = false;
      showScreen('quiz');
      renderQuestion();
    }

    function renderQuestion() {
      answered = false;
      const q = questions[currentIndex];
      const total = questions.length;

      document.getElementById('progressLabel').textContent = `${currentIndex + 1} / ${total}`;
      document.getElementById('progressBar').style.width = `${(currentIndex / total) * 100}%`;

      const badge = document.getElementById('categoryBadge');
      badge.textContent = q.category;
      badge.dataset.cat = q.category;

      const stars = ['★☆☆','★★☆','★★★'][q.difficulty - 1] || '★☆☆';
      const dClass = `d${q.difficulty || 1}`;
      document.getElementById('questionNumber').innerHTML =
        `<span>Q${currentIndex + 1}</span><span class="difficulty-stars ${dClass}">${stars}</span>`;
      document.getElementById('questionText').innerHTML = renderText(q.text);

      const container = document.getElementById('choicesContainer');
      container.innerHTML = '';
      ['A','B','C','D'].forEach((label, i) => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.innerHTML = `<span class="choice-label">${label}</span><span>${renderText(q.choices[i])}</span>`;
        btn.onclick = () => selectChoice(i);
        container.appendChild(btn);
      });

      selectedIdx = -1;
      document.getElementById('feedback').className = 'feedback';
      document.getElementById('confirmBtn').classList.remove('show');
      document.getElementById('nextBtn').classList.remove('show');
      document.getElementById('retryBtn').classList.remove('show');
    }

    function selectAnswer(idx) {
      if (answered) return;
      answered = true;

      const q = questions[currentIndex];
      const btns = document.querySelectorAll('.choice-btn');
      const ok = idx === q.answer;

      btns.forEach(b => (b.disabled = true));
      btns[idx].classList.add(ok ? 'correct' : 'wrong');
      if (!ok) btns[q.answer].classList.add('correct');

      if (ok && !retriedCurrent) score++;

      const fb = document.getElementById('feedback');
      fb.className = 'feedback ' + (ok ? 'correct-fb' : 'wrong-fb') + ' show';
      document.getElementById('fbIcon').textContent = ok ? '✅' : '❌';
      document.getElementById('fbMain').textContent = ok ? '正解！すばらしい！' : `不正解… 正解は「${'ABCD'[q.answer]}」でした。`;
      document.getElementById('fbHint').textContent = q.hint;

      if (!ok) document.getElementById('retryBtn').classList.add('show');

      const nb = document.getElementById('nextBtn');
      nb.textContent = currentIndex + 1 < questions.length ? '次の問題へ →' : '結果を見る 🎉';
      nb.classList.add('show');
    }

    function nextQuestion() {
      retriedCurrent = false;
      currentIndex++;
      currentIndex < questions.length ? renderQuestion() : showResult();
    }

    function showResult() {
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressLabel').textContent = `${questions.length} / ${questions.length}`;

      const pct = Math.round((score / questions.length) * 100);
      const [[emoji, title]] = [
        pct === 100 ? ['🏆','完璧！全問正解！'] :
        pct >= 80   ? ['🎉','すごい！よく覚えてる！'] :
        pct >= 60   ? ['👍','なかなか良い！あと少し！'] :
        pct >= 40   ? ['📖','もう一度復習しよう！'] :
                      ['💪','虎の巻を読み直そう！']
      ];

      document.getElementById('resultEmoji').textContent = emoji;
      document.getElementById('resultTitle').textContent = title;
      document.getElementById('resultScore').innerHTML =
        `正解数：<strong>${score} / ${questions.length}</strong>（正解率 ${pct}%）`;

      showScreen('result');
    }

    // ── Init ──────────────────────────────────────────────────────
    initFilterGrid();
    buildWordList();
    showScreen('start');
  </script>
</body>
</html>
