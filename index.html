<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>虎の巻 クイズアプリ</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
      background: #0d1117;
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      color: #e6edf3;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 20%, rgba(0,255,180,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 35% at 80% 80%, rgba(88,166,255,0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    .quiz-card {
      position: relative;
      width: min(720px, 100%);
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 36px 44px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }

    /* ── Header ── */
    .quiz-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .quiz-title {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #00ffb4;
    }

    .progress-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      visibility: hidden;
    }

    .progress-label { font-size: 0.75rem; color: #8b949e; }

    .progress-bar-bg {
      width: 120px;
      height: 6px;
      background: #21262d;
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #00ffb4, #58a6ff);
      border-radius: 99px;
      transition: width 0.4s ease;
      width: 0%;
    }

    /* ── Start Screen ── */
    .start-lead {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .start-sub {
      font-size: 0.85rem;
      color: #8b949e;
      margin-bottom: 28px;
    }

    .start-sub code {
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 0.8rem;
      color: #00ffb4;
      font-family: 'Consolas', 'Monaco', monospace;
    }

    .filter-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #8b949e;
      margin-bottom: 12px;
    }

    .filter-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 32px;
    }

    .filter-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 12px 20px;
      min-width: 100px;
      background: #21262d;
      border: 2px solid #30363d;
      border-radius: 12px;
      color: #8b949e;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
    }

    .filter-btn .f-count { font-size: 0.72rem; font-weight: 400; opacity: 0.7; }
    .filter-btn:hover { border-color: #58a6ff; color: #e6edf3; }
    .filter-btn.active { color: #0d1117; }

    .filter-btn[data-cat="all"].active        { background: linear-gradient(135deg,#00ffb4,#58a6ff); border-color: transparent; }
    .filter-btn[data-cat="コマンド"].active   { background: #e3b341; border-color: #e3b341; }
    .filter-btn[data-cat="Git"].active        { background: #bc8cff; border-color: #bc8cff; }
    .filter-btn[data-cat="言語の違い"].active { background: #58a6ff; border-color: #58a6ff; }
    .filter-btn[data-cat="Web基礎"].active    { background: #3fb950; border-color: #3fb950; }
    .filter-btn[data-cat="npm"].active        { background: #f85149; border-color: #f85149; }
    .filter-btn[data-cat="データ管理"].active { background: #00b4d8; border-color: #00b4d8; }
    .filter-btn[data-cat="PWA"].active        { background: #f0883e; border-color: #f0883e; }
    .filter-btn[data-cat="JS基礎"].active     { background: #f1e05a; border-color: #f1e05a; }
    .filter-btn[data-cat="技術スタック"].active { background: #ff7b72; border-color: #ff7b72; }
    .filter-btn[data-cat="IT基礎"].active     { background: #d2a8ff; border-color: #d2a8ff; }
    .filter-btn[data-cat="新着"].active       { background: linear-gradient(135deg,#ffd700,#ff9f43); border-color: transparent; color: #0d1117; }
    .filter-btn[data-cat="新着"]              { border-color: rgba(255,215,0,0.4); color: #ffd700; }
    .filter-btn[data-cat="新着"]:hover        { border-color: #ffd700; }

    .filter-section-label {
      width: 100%;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #8b949e;
      padding: 6px 2px 2px;
    }

    .start-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #00ffb4 0%, #58a6ff 100%);
      border: none;
      border-radius: 12px;
      font-size: 1.05rem;
      font-weight: 700;
      color: #0d1117;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.04em;
    }

    .start-btn:hover { opacity: 0.9; transform: translateY(-1px); }

    /* ── Category Badge ── */
    .category-badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      padding: 3px 10px;
      border-radius: 99px;
      margin-bottom: 12px;
      background: rgba(88,166,255,0.15);
      border: 1px solid rgba(88,166,255,0.35);
      color: #58a6ff;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }

    .category-badge[data-cat="コマンド"]   { background: rgba(227,179,65,0.15);  border-color: rgba(227,179,65,0.35);  color: #e3b341; }
    .category-badge[data-cat="Git"]        { background: rgba(188,140,255,0.15); border-color: rgba(188,140,255,0.35); color: #bc8cff; }
    .category-badge[data-cat="言語の違い"] { background: rgba(88,166,255,0.15);  border-color: rgba(88,166,255,0.35);  color: #58a6ff; }
    .category-badge[data-cat="Web基礎"]   { background: rgba(63,185,80,0.15);   border-color: rgba(63,185,80,0.35);   color: #3fb950; }
    .category-badge[data-cat="npm"]        { background: rgba(248,81,73,0.15);   border-color: rgba(248,81,73,0.35);   color: #f85149; }
    .category-badge[data-cat="データ管理"] { background: rgba(0,180,216,0.15);   border-color: rgba(0,180,216,0.35);   color: #00b4d8; }
    .category-badge[data-cat="PWA"]       { background: rgba(240,136,62,0.15);  border-color: rgba(240,136,62,0.35);  color: #f0883e; }
    .category-badge[data-cat="技術スタック"] { background: rgba(255,123,114,0.15); border-color: rgba(255,123,114,0.35); color: #ff7b72; }
    .category-badge[data-cat="IT基礎"]     { background: rgba(210,168,255,0.15); border-color: rgba(210,168,255,0.35); color: #d2a8ff; }

    /* ── Question ── */
    .question-number {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.75rem;
      color: #8b949e;
      margin-bottom: 8px;
    }

    .difficulty-stars { letter-spacing: 0.05em; font-size: 0.82rem; }
    .difficulty-stars.d1 { color: #3fb950; }
    .difficulty-stars.d2 { color: #e3b341; }
    .difficulty-stars.d3 { color: #f85149; }

    .diff-filter-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .diff-btn {
      padding: 7px 16px;
      border-radius: 20px;
      border: 2px solid #30363d;
      background: #21262d;
      color: #8b949e;
      font-size: 0.82rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.18s;
    }
    .diff-btn:hover { border-color: #58a6ff; color: #c9d1d9; }
    .diff-btn.active-all  { border-color: #58a6ff; background: rgba(88,166,255,0.12); color: #58a6ff; }
    .diff-btn.active-d1   { border-color: #3fb950; background: rgba(63,185,80,0.12);  color: #3fb950; }
    .diff-btn.active-d2   { border-color: #e3b341; background: rgba(227,179,65,0.12); color: #e3b341; }
    .diff-btn.active-d3   { border-color: #f85149; background: rgba(248,81,73,0.12);  color: #f85149; }

    .question-text {
      font-size: 1.25rem;
      font-weight: 600;
      line-height: 1.7;
      color: #e6edf3;
      margin-bottom: 28px;
      min-height: 3.5rem;
    }

    .question-text code {
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 1rem;
      font-family: 'Consolas', 'Monaco', monospace;
      color: #e6edf3;
    }

    /* ── Tooltip Terms ── */
    .term {
      border-bottom: 1px dashed #58a6ff;
      color: #58a6ff;
      cursor: help;
    }

    code.term {
      color: #00ffb4;
      border-bottom: 1px dashed #00ffb4;
    }

    /* ── Choices ── */
    .choices { display: flex; flex-direction: column; gap: 10px; }

    .choice-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 13px 18px;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 10px;
      color: #c9d1d9;
      font-size: 0.95rem;
      font-family: inherit;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.15s, background 0.15s, color 0.15s, transform 0.1s;
    }

    .choice-btn:hover:not(:disabled) {
      border-color: #58a6ff;
      background: #1c2128;
      color: #e6edf3;
      transform: translateX(3px);
    }

    .choice-btn .choice-label {
      flex-shrink: 0;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #30363d;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      color: #8b949e;
      transition: background 0.15s, color 0.15s;
    }

    .choice-btn.selected { border-color: #58a6ff; background: rgba(88,166,255,0.12); color: #58a6ff; }
    .choice-btn.selected .choice-label { background: #58a6ff; color: #0d1117; }
    .choice-btn.correct { border-color: #00ffb4; background: rgba(0,255,180,0.1); color: #00ffb4; }
    .choice-btn.correct .choice-label { background: #00ffb4; color: #0d1117; }
    .choice-btn.wrong   { border-color: #f85149; background: rgba(248,81,73,0.1); color: #f85149; }
    .choice-btn.wrong   .choice-label { background: #f85149; color: #fff; }
    .choice-btn:disabled { cursor: not-allowed; }

    /* ── Confirm Button ── */
    .confirm-btn {
      display: none;
      width: 100%;
      margin-top: 10px;
      padding: 14px;
      background: #58a6ff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      color: #0d1117;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.04em;
    }
    .confirm-btn.show { display: block; }
    .confirm-btn:hover { opacity: 0.9; transform: translateY(-1px); }

    /* ── Quiz Top Row (back btn + badge) ── */
    .quiz-top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .back-btn {
      font-size: 0.8rem;
      font-weight: 600;
      color: #8b949e;
      background: transparent;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 5px 12px;
      cursor: pointer;
      font-family: inherit;
      transition: color 0.15s, border-color 0.15s;
    }
    .back-btn:hover { color: #e6edf3; border-color: #8b949e; }

    /* ── Feedback ── */
    .feedback {
      margin-top: 20px;
      padding: 14px 18px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      display: none;
      align-items: flex-start;
      gap: 10px;
    }

    .feedback.show { display: flex; }
    .feedback.correct-fb { background: rgba(0,255,180,0.12); border: 1px solid rgba(0,255,180,0.4); color: #00ffb4; }
    .feedback.wrong-fb   { background: rgba(248,81,73,0.12);  border: 1px solid rgba(248,81,73,0.4);  color: #f85149; }
    .feedback .fb-icon   { font-size: 1.3rem; flex-shrink: 0; margin-top: 1px; }
    .feedback .fb-text   { flex: 1; }
    .feedback .fb-hint   { font-size: 0.82rem; font-weight: 400; color: #8b949e; margin-top: 4px; }

    /* ── Next Button ── */
    .next-btn {
      display: none;
      flex: 1;
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #00ffb4 0%, #58a6ff 100%);
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      color: #0d1117;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.04em;
    }

    .next-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .next-btn.show  { display: block; }

    /* ── Result ── */
    .result-screen { display: none; text-align: center; }
    .result-screen.show { display: block; }
    .result-emoji  { font-size: 4rem; margin-bottom: 16px; }

    .result-title {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #00ffb4, #58a6ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .result-score { font-size: 1.1rem; color: #8b949e; margin-bottom: 32px; }
    .result-score strong { font-size: 2rem; color: #e6edf3; -webkit-text-fill-color: #e6edf3; }

    .result-buttons { display: flex; gap: 12px; justify-content: center; }

    .restart-btn, .change-cat-btn {
      padding: 14px 28px;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    .restart-btn    { background: linear-gradient(135deg,#00ffb4,#58a6ff); color: #0d1117; }
    .change-cat-btn { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; }
    .restart-btn:hover, .change-cat-btn:hover { opacity: 0.9; transform: translateY(-1px); }

    /* ── Tooltip Bubble ── */
    .tooltip-bubble {
      position: fixed;
      z-index: 9999;
      max-width: min(260px, calc(100vw - 24px));
      padding: 10px 14px;
      background: #1c2128;
      border: 1px solid #58a6ff;
      border-radius: 8px;
      font-size: 0.82rem;
      line-height: 1.5;
      color: #c9d1d9;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.12s;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }

    .tooltip-bubble.visible { opacity: 1; }

    @media (max-width: 520px) {
      .quiz-card { padding: 24px 18px; }
      .question-text { font-size: 1.1rem; }
      .filter-btn { min-width: 80px; padding: 10px 14px; }
      .result-buttons { flex-direction: column; }
      .action-row { flex-direction: column; }
    }

    /* ── Category Breakdown ── */
    .cat-breakdown {
      margin-top: 20px;
      text-align: left;
      border: 1px solid #21262d;
      border-radius: 10px;
      overflow: hidden;
    }
    .cat-breakdown-title {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: #8b949e;
      text-transform: uppercase;
      padding: 8px 14px;
      background: #1c2128;
      border-bottom: 1px solid #21262d;
    }
    .cat-row {
      display: grid;
      grid-template-columns: 80px 1fr 44px;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-bottom: 1px solid #21262d;
      font-size: 0.8rem;
    }
    .cat-row:last-child { border-bottom: none; }
    .cat-row-name { color: #e6edf3; font-weight: 600; }
    .cat-bar-bg {
      height: 6px;
      background: #21262d;
      border-radius: 4px;
      overflow: hidden;
    }
    .cat-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.6s ease;
    }
    .cat-row-pct { color: #8b949e; font-size: 0.75rem; text-align: right; }

    .stats-overall {
      padding: 14px 16px 10px;
      font-size: 0.85rem;
      color: #8b949e;
      border-bottom: 1px solid #21262d;
    }
    .stats-overall strong { color: #e6edf3; }
    .stats-empty {
      padding: 20px;
      text-align: center;
      color: #484f58;
      font-size: 0.85rem;
    }

    /* ── Streak & Daily ── */
    .streak-wrap { text-align: center; margin-bottom: 10px; }
    .streak-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(227,179,65,0.12);
      border: 1px solid rgba(227,179,65,0.35);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.82rem;
      font-weight: 700;
      color: #e3b341;
    }
    .streak-zero { color: #484f58; border-color: #21262d; background: transparent; }
    .daily-btn {
      width: 100%;
      margin-top: 10px;
      padding: 14px;
      background: linear-gradient(135deg,#f0883e,#e3b341);
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 700;
      color: #0d1117;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.04em;
    }
    .daily-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .daily-done-badge {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      box-sizing: border-box;
      background: rgba(63,185,80,0.08);
      border: 1px solid rgba(63,185,80,0.3);
      border-radius: 12px;
      font-size: 0.88rem;
      font-weight: 600;
      color: #3fb950;
      text-align: center;
    }
    .daily-label {
      text-align: center;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #e3b341;
      margin-bottom: 4px;
    }

    /* ── Word List ── */
    .word-list-toggle {
      width: 100%;
      margin-top: 14px;
      padding: 12px;
      background: transparent;
      border: 1px dashed #30363d;
      border-radius: 10px;
      color: #8b949e;
      font-size: 0.88rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      letter-spacing: 0.03em;
      text-align: center;
    }
    .word-list-toggle:hover { border-color: #58a6ff; color: #58a6ff; }

    .word-list-section {
      margin-top: 14px;
      border: 1px solid #21262d;
      border-radius: 12px;
      overflow: hidden;
    }
    .wl-search-wrap {
      padding: 10px 12px;
      background: #1c2128;
      border-bottom: 1px solid #21262d;
    }
    .wl-search {
      width: 100%;
      box-sizing: border-box;
      padding: 8px 12px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #e6edf3;
      font-size: 0.85rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .wl-search::placeholder { color: #484f58; }
    .wl-search:focus { border-color: #58a6ff; }
    .wl-no-result {
      padding: 20px;
      text-align: center;
      color: #484f58;
      font-size: 0.85rem;
      display: none;
    }

    .wl-section-label {
      padding: 10px 16px 6px;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #8b949e;
      background: #0d1117;
      border-bottom: 1px solid #21262d;
    }

    .wl-cat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 12px 16px;
      background: #1c2128;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-bottom: 1px solid #21262d;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }
    .wl-cat-header:hover { background: #21262d; }

    .wl-cat-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .wl-cat-count {
      font-size: 0.65rem;
      color: #8b949e;
      font-weight: 400;
      letter-spacing: 0;
      text-transform: none;
    }
    .wl-cat-arrow {
      font-size: 0.72rem;
      color: #8b949e;

  <div class="tooltip-bubble" id="tooltipBubble"></div>

  <div class="quiz-card">

  <script>
    // ── Glossary ──────────────────────────────────────────────────
    const GLOSSARY = {
      'cd':               'Change Directory。ターミナルで作業ディレクトリを移動するコマンド。',
      'mkdir':            'make directory。新しいディレクトリを作成するコマンド。',
      'pwd':              'print working directory。現在のディレクトリのフルパスを表示するコマンド。',

      'git':              '分散型バージョン管理システム。ファイルの変更履歴を管理・記録するツール。',
      'git init':         'カレントディレクトリを Git リポジトリとして初期化するコマンド。',

      'git push':         'ローカルのコミットをリモートリポジトリに送信するコマンド。',
      'git pull':         'リモートリポジトリの変更をローカルに取得・統合するコマンド。',
      'git status':       '作業ツリーの変更状態を確認するコマンド。',
      'git log':          'コミット履歴の一覧を表示するコマンド。',
      'git clone':        'リモートリポジトリをローカルにコピーするコマンド。',
      'リポジトリ':       'ファイルや変更履歴を保存・管理する場所。ローカルとリモートの2種類がある。',
      'ステージングエリア': 'コミット前に変更を一時的に登録しておく準備ゾーン（舞台袖のイメージ）。',
      'ブランチ':         '開発の作業ラインを分岐させる機能。本流（main）を壊さず並行作業できる。',
      'npm':              'Node Package Manager。Node.js のパッケージ（ライブラリ）を管理するツール。',
      'Node.js':          'JavaScript をブラウザ外（サーバーやターミナルなど）で実行できる環境。npm・pnpm など、開発ツールを動かす土台にもなっている。',
      'JavaScript':       'ブラウザで動作するプログラミング言語。Node.js でサーバーサイドにも使える。',

      'node_modules':     'npm install で取得したパッケージが格納されるフォルダ。通常 .gitignore に追加する。',

      { key: 'Web基礎',      label: 'Web 基礎' },
      { key: 'npm',          label: 'npm' },
      { key: 'データ管理',   label: 'データ管理' },
      { key: 'PWA',          label: 'PWA' },
      { key: '技術スタック', label: '技術スタック' },
    ];

    function initFilterGrid() {
      const grid = document.getElementById('filterGrid');
      CATS.forEach(({ key, label }) => {
        if (key === '__label__') {
          const div = document.createElement('div');
          div.className = 'filter-section-label';
          div.textContent = label;
          grid.appendChild(div);
          return;
        }
        const count = key === 'all' ? ALL_QUESTIONS.length
          : key === '新着' ? countUnseen()
          : ALL_QUESTIONS.filter(q => q.category === key).length;
        const btn = document.createElement('button');
        btn.className = 'filter-btn' + (key === selectedCategory ? ' active' : '');
        btn.dataset.cat = key;
        btn.innerHTML = `<span>${label}</span><span class="f-count">${count}問</span>`;
        btn.onclick = () => {
          selectedCategory = key;
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          updateWeakBtn();
        };
        grid.appendChild(btn);
      });
    }

    function initDiffFilter() {
      const row = document.getElementById('diffFilterRow');
      const DIFFS = [
        { val: 0, label: '全て',       cls: 'active-all' },
        { val: 1, label: '★ 初級',     cls: 'active-d1'  },
        { val: 2, label: '★★ 中級',   cls: 'active-d2'  },
        { val: 3, label: '★★★ 上級', cls: 'active-d3'  },
      ];
      DIFFS.forEach(({ val, label, cls }) => {
        const btn = document.createElement('button');
        btn.className = 'diff-btn' + (val === selectedDifficulty ? ' ' + cls : '');
        btn.textContent = label;
        btn.onclick = () => {
          selectedDifficulty = val;
          document.querySelectorAll('.diff-btn').forEach(b => b.className = 'diff-btn');
          btn.className = 'diff-btn ' + cls;
        };
        row.appendChild(btn);
      });
    }

    // ── Text Rendering (tooltips) ─────────────────────────────────
    function renderText(raw) {
      return raw.split(/`([^`]+)`/).map((part, i) => {
        if (i % 2 === 0) {
          return escapeHtml(part).replace(/\[\[([^\]]+)\]\]/g, (_, term) => {
            const def = GLOSSARY[term];
            return def
              ? `<span class="term" data-def="${escapeAttr(def)}">${escapeHtml(term)}</span>`
              : escapeHtml(term);
          });
        }
        const def = GLOSSARY[part];
        return def
          ? `<code class="term" data-def="${escapeAttr(def)}">${escapeHtml(part)}</code>`
          : `<code>${escapeHtml(part)}</code>`;
      }).join('');
    }

    // ── Tooltip ───────────────────────────────────────────────────
    const tipEl = document.getElementById('tooltipBubble');
    let tipTarget = null;
    let pinnedTip = null;

    function showTip(term, x, y) {
      tipEl.textContent = term.dataset.def || '';
      tipEl.style.left = x + 'px';
      tipEl.style.top  = y + 'px';
      tipEl.classList.add('visible');
    }

    function hideTip() {
      tipTarget = null;
      pinnedTip = null;
      tipEl.classList.remove('visible');
    }

    // Desktop: hover
    document.addEventListener('mouseover', e => {
      if (pinnedTip) return;
      const term = e.target.closest('.term');
      if (!term) return;
      tipTarget = term;
      tipEl.textContent = term.dataset.def || '';
      tipEl.classList.add('visible');
    });

    document.addEventListener('mouseout', e => {
      if (pinnedTip) return;
      const term = e.target.closest('.term');
      if (!term) return;
      if (!e.relatedTarget || !term.contains(e.relatedTarget)) {
        tipTarget = null;
        tipEl.classList.remove('visible');
      }
    });

    document.addEventListener('mousemove', e => {
      if (!tipTarget || pinnedTip) return;
      const tw = tipEl.offsetWidth || 260, th = tipEl.offsetHeight || 60;
      const x = Math.min(e.clientX + 14, window.innerWidth - tw - 8);
      const y = e.clientY - th - 10 < 8 ? e.clientY + 22 : e.clientY - th - 10;
      tipEl.style.left = x + 'px';
      tipEl.style.top  = y + 'px';
    });

    // Mobile: tap to show / tap again or tap outside to hide
    document.addEventListener('click', e => {
      const term = e.target.closest('.term');
      if (term) {
        e.stopPropagation();
        if (pinnedTip === term) { hideTip(); return; }
        pinnedTip = term;
        tipTarget = null;
        const rect = term.getBoundingClientRect();
        const tw = tipEl.offsetWidth || 260, th = tipEl.offsetHeight || 60;
        const x = Math.min(Math.max(rect.left, 8), window.innerWidth - tw - 8);
        const y = rect.top - th - 10 < 8 ? rect.bottom + 8 : rect.top - th - 10;
        showTip(term, x, y);
      } else if (pinnedTip) {
        hideTip();
      }
    });

    // ── Word List ─────────────────────────────────────────────────
    function buildWordList() {
      const section = document.getElementById('wordListSection');
      section.innerHTML = '';

      // 検索バー
      const searchWrap = document.createElement('div');
      searchWrap.className = 'wl-search-wrap';
      searchWrap.innerHTML = '<input class="wl-search" id="wlSearch" type="text" placeholder="🔍 用語を検索…" oninput="filterWordList(this.value)">';
      section.appendChild(searchWrap);

      // 見つからない時のメッセージ
      const noResult = document.createElement('div');
      noResult.className = 'wl-no-result';
      noResult.id = 'wlNoResult';
      noResult.textContent = '見つかりませんでした。用語集への追加を検討しましょう！';
      section.appendChild(noResult);

      WORD_LIST_GROUPS.forEach(group => {
        if (group.isLabel) {
          const lbl = document.createElement('div');
          lbl.className = 'wl-section-label';
          lbl.textContent = group.label;
          section.appendChild(lbl);
          return;
        }
        const { cat, color, terms } = group;

        // フォルダ（グループ全体のラッパー）
        const groupEl = document.createElement('div');
        groupEl.className = 'wl-cat-group';
        groupEl.dataset.cat = cat;
        section.appendChild(groupEl);

        // カテゴリヘッダー（タップで開閉）
        const termCount = terms.filter(t => GLOSSARY[t]).length;
        const header = document.createElement('div');
        header.className = 'wl-cat-header';
        header.dataset.cat = cat;
        header.style.color = color;
        header.innerHTML = `<span>${escapeHtml(cat)}</span><span class="wl-cat-right"><span class="wl-cat-count">${termCount}語</span><span class="wl-cat-arrow">▾</span></span>`;
        groupEl.appendChild(header);

        // 中身コンテナ（初期は非表示）
        const itemsEl = document.createElement('div');
        itemsEl.className = 'wl-cat-items';
        groupEl.appendChild(itemsEl);

        header.addEventListener('click', () => {
          groupEl.classList.toggle('open');
        });

        // 各用語
        const sorted = [...terms].sort((a, b) => (GLOSSARY_LEVEL[a] || 1) - (GLOSSARY_LEVEL[b] || 1));
        sorted.forEach(term => {
          const def = GLOSSARY[term];
          if (!def) return;
          const row = document.createElement('div');
          row.className = 'wl-item';
          row.dataset.term = term.toLowerCase();
          row.dataset.def = def.toLowerCase();
          row.dataset.cat = cat;
          const lv = GLOSSARY_LEVEL[term] || 1;
          const stars = '★'.repeat(lv) + '☆'.repeat(3 - lv);
          row.innerHTML = `
            <div class="wl-front">
              <span class="wl-term">${escapeHtml(term)}</span>
              <div class="wl-front-right">
                <span class="difficulty-stars d${lv}">${stars}</span>
                <span class="wl-hint">タップで確認 ▾</span>
              </div>
            </div>
            <div class="wl-back">${escapeHtml(def)}</div>`;
          row.addEventListener('click', () => {
            const isOpen = row.classList.toggle('open');
            row.querySelector('.wl-hint').textContent = isOpen ? '閉じる ▴' : 'タップで確認 ▾';
          });
          itemsEl.appendChild(row);
        });
      });
    }

    function filterWordList(query) {
      const q = query.trim().toLowerCase();
      const groups = document.querySelectorAll('.wl-cat-group');

      groups.forEach(group => {
        const items = group.querySelectorAll('.wl-item');
        let hasMatch = false;
        items.forEach(item => {
          const match = !q || item.dataset.term.includes(q) || item.dataset.def.includes(q);
          item.style.display = match ? '' : 'none';
          if (match) hasMatch = true;
        });
        group.style.display = hasMatch ? '' : 'none';
        // 検索中は一致カテゴリを自動展開、検索解除時は全部閉じる
        if (q && hasMatch) {
          group.classList.add('open');
        } else if (!q) {
          group.classList.remove('open');
        }
      });

      // セクションラベルは配下に表示中グループがあれば表示
      document.querySelectorAll('.wl-section-label').forEach(lbl => {
        let next = lbl.nextElementSibling;
        let hasVisible = false;
        while (next && !next.classList.contains('wl-section-label')) {
          if (next.classList.contains('wl-cat-group') && next.style.display !== 'none') hasVisible = true;
          next = next.nextElementSibling;
        }
        lbl.style.display = hasVisible ? '' : 'none';
      });

      const anyVisible = [...groups].some(g => g.style.display !== 'none');
      document.getElementById('wlNoResult').style.display = anyVisible ? 'none' : '';
    }

    let wordListOpen = false;
    function toggleWordList() {
      wordListOpen = !wordListOpen;
      document.getElementById('wordListSection').style.display = wordListOpen ? '' : 'none';
      document.getElementById('wordListToggle').textContent =
        wordListOpen ? '📚 単語リストを閉じる ▴' : '📚 単語リストを確認する ▾';
    }

    // ── Retry ─────────────────────────────────────────────────────
    function retryQuestion() {
      retriedCurrent = true;
      renderQuestion();
    }

    // ── Choice Selection & Confirmation ───────────────────────────
    function selectChoice(idx) {
      if (answered) return;
      selectedIdx = idx;
      document.querySelectorAll('.choice-btn').forEach((btn, i) => {
        btn.classList.toggle('selected', i === idx);
      });
      document.getElementById('confirmBtn').classList.add('show');
    }

    function confirmAnswer() {
      if (selectedIdx < 0 || answered) return;
      document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
      document.getElementById('confirmBtn').classList.remove('show');
      selectAnswer(selectedIdx);
    }

    function backToTop() {
      retriedCurrent = false;
      isDaily = false;
      isDailyReview = false;
      renderDailyBtn();
      showScreen('start');
    }

    // ── Quiz Flow ─────────────────────────────────────────────────
    function applyDiffFilter(pool) {
      return selectedDifficulty === 0 ? pool : pool.filter(q => q.difficulty === selectedDifficulty);
    }

    function startQuiz() {
      isDaily = false;
      isDailyReview = false;
      let pool;
      if (selectedCategory === 'all') {
        pool = ALL_QUESTIONS;
      } else if (selectedCategory === '新着') {
        pool = getNewPool();
        if (pool.length === 0) {
          alert('新着問題はすべて復習済みです！🎉');
          return;
        }
      } else {
        pool = ALL_QUESTIONS.filter(q => q.category === selectedCategory);
      }
      pool = applyDiffFilter(pool);
      if (pool.length === 0) {
        alert('選択した条件に一致する問題がありません。難易度やカテゴリを変えてみてください。');
        return;
      }
      const limit = selectedCategory === '新着' ? pool.length : 10;
      questions = shuffle(pool).slice(0, Math.min(limit, pool.length));
      currentIndex = 0;
      score = 0;
      catStats = {};
      retriedCurrent = false;
      showScreen('quiz');
      renderQuestion();
    }

    function renderQuestion() {
      answered = false;
      const q = questions[currentIndex];
      const total = questions.length;

      document.getElementById('progressLabel').textContent = `${currentIndex + 1} / ${total}`;
      document.getElementById('progressBar').style.width = `${(currentIndex / total) * 100}%`;

      const dailyLabel = document.getElementById('dailyLabel');
      if (isDaily) {
        dailyLabel.style.display = '';
        dailyLabel.textContent = isDailyReview ? '🔁 復習ラウンド' : '📅 デイリークイズ';
      } else {
        dailyLabel.style.display = 'none';
      }

      const badge = document.getElementById('categoryBadge');
      badge.textContent = q.category;
      badge.dataset.cat = q.category;

      const stars = ['★☆☆','★★☆','★★★'][q.difficulty - 1] || '★☆☆';
      const dClass = `d${q.difficulty || 1}`;
      document.getElementById('questionNumber').innerHTML =
        `<span>Q${currentIndex + 1}</span><span class="difficulty-stars ${dClass}">${stars}</span>`;
      document.getElementById('questionText').innerHTML = renderText(q.text);

      const container = document.getElementById('choicesContainer');
      container.innerHTML = '';
      ['A','B','C','D'].forEach((label, i) => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.innerHTML = `<span class="choice-label">${label}</span><span>${renderText(q.choices[i])}</span>`;
        btn.onclick = () => selectChoice(i);
        container.appendChild(btn);
      });

      selectedIdx = -1;
      document.getElementById('feedback').className = 'feedback';
      document.getElementById('confirmBtn').classList.remove('show');
      document.getElementById('nextBtn').classList.remove('show');
      document.getElementById('retryBtn').classList.remove('show');
    }

    function selectAnswer(idx) {
      if (answered) return;
      answered = true;

      const q = questions[currentIndex];
      const btns = document.querySelectorAll('.choice-btn');
      const ok = idx === q.answer;

      btns.forEach(b => (b.disabled = true));
      btns[idx].classList.add(ok ? 'correct' : 'wrong');
      if (!ok) btns[q.answer].classList.add('correct');

      if (ok && !retriedCurrent) score++;

      if (!retriedCurrent) {
        const weak = loadWeak();
        ok ? weak.delete(q.text) : weak.add(q.text);
        saveWeak(weak);
        updateWeakBtn();

        if (!catStats[q.category]) catStats[q.category] = { correct: 0, total: 0 };
        catStats[q.category].total++;
        if (ok) catStats[q.category].correct++;
        updateAllStats(q.category, ok);

        if (isDaily && !ok) {
          if (!isDailyReview) dailyWrongFirst.push(q);
          else dailyReviewWrong.push(q);
        }
      }

      const fb = document.getElementById('feedback');
      fb.className = 'feedback ' + (ok ? 'correct-fb' : 'wrong-fb') + ' show';
      document.getElementById('fbIcon').textContent = ok ? '✅' : '❌';
      document.getElementById('fbMain').textContent = ok ? '正解！すばらしい！' : `不正解… 正解は「${'ABCD'[q.answer]}」でした。`;
      document.getElementById('fbHint').textContent = q.hint;

      if (!ok) document.getElementById('retryBtn').classList.add('show');

      const nb = document.getElementById('nextBtn');
      nb.textContent = currentIndex + 1 < questions.length ? '次の問題へ →' : '結果を見る 🎉';
      nb.classList.add('show');
    }

    function nextQuestion() {
      retriedCurrent = false;
      currentIndex++;
      currentIndex < questions.length ? renderQuestion() : showResult();
    }

    function showResult() {
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressLabel').textContent = `${questions.length} / ${questions.length}`;

      const pct = Math.round((score / questions.length) * 100);
      const [[emoji, title]] = [
        pct === 100 ? ['🏆','完璧！全問正解！'] :
        pct >= 80   ? ['🎉','すごい！よく覚えてる！'] :
        pct >= 60   ? ['👍','なかなか良い！あと少し！'] :
        pct >= 40   ? ['📖','もう一度復習しよう！'] :
                      ['💪','虎の巻を読み直そう！']
      ];

      document.getElementById('resultEmoji').textContent = emoji;
      document.getElementById('resultTitle').textContent = title;
      document.getElementById('resultScore').innerHTML =
        `正解数：<strong>${score} / ${questions.length}</strong>（正解率 ${pct}%）`;

      const cats = Object.keys(catStats);
      const bd = document.getElementById('catBreakdown');
      if (cats.length > 1) {
        const rows = cats.map(cat => {
          const { correct, total } = catStats[cat];
          const p = Math.round((correct / total) * 100);
          const color = p >= 80 ? '#3fb950' : p >= 60 ? '#e3b341' : '#f85149';
          return `<div class="cat-row">
            <span class="cat-row-name">${escapeHtml(cat)}</span>
            <div class="cat-bar-bg"><div class="cat-bar-fill" style="width:${p}%;background:${color}"></div></div>
            <span class="cat-row-pct">${correct}/${total}</span>
          </div>`;
        }).join('');
        bd.innerHTML = `<div class="cat-breakdown"><div class="cat-breakdown-title">カテゴリ別正答率</div>${rows}</div>`;
      } else {
        bd.innerHTML = '';
      }

      // デイリークイズ 第1ラウンド終了
      if (isDaily && !isDailyReview) {
        if (dailyWrongFirst.length > 0) {
          document.getElementById('resultEmoji').textContent = '📝';
          document.getElementById('resultTitle').textContent = `${dailyWrongFirst.length}問を復習しましょう！`;
          document.getElementById('resultButtons').innerHTML =
            `<button class="restart-btn" onclick="startDailyReview()">復習スタート →</button>`;
        } else {
          completeDailyQuiz();
          document.getElementById('resultEmoji').textContent = '🔥';
          document.getElementById('resultTitle').textContent = '完璧！デイリー完了！';
          document.getElementById('resultScore').innerHTML =
            `<strong>${getStreak()}日連続達成！</strong>`;
          document.getElementById('catBreakdown').innerHTML = '';
          document.getElementById('resultButtons').innerHTML =
            `<button class="restart-btn" onclick="goHome()">トップへ 🏠</button>`;
        }
        showScreen('result');
        return;
      }

      // デイリー 復習ラウンド終了
      if (isDaily && isDailyReview) {
        if (dailyReviewWrong.length > 0) {
          questions = [...dailyReviewWrong];
          dailyReviewWrong = [];
          currentIndex = 0;
          score = 0;
          catStats = {};
          retriedCurrent = false;
          renderQuestion();
          return;
        }
        completeDailyQuiz();
        document.getElementById('resultEmoji').textContent = '🔥';
        document.getElementById('resultTitle').textContent = 'デイリー完了！';
        document.getElementById('resultScore').innerHTML =
          `全問クリア！<strong>${getStreak()}日連続達成！</strong>`;
        document.getElementById('catBreakdown').innerHTML = '';
        document.getElementById('resultButtons').innerHTML =
          `<button class="restart-btn" onclick="goHome()">トップへ 🏠</button>`;
        showScreen('result');
        return;
      }

      // 通常クイズ
      if (selectedCategory === '新着') {
        markAllNewSeen();
        document.getElementById('resultButtons').innerHTML =
          `<button class="change-cat-btn" onclick="isDaily=false;showScreen('start')">カテゴリ変更</button>
           <button class="restart-btn" onclick="startQuiz()">もう一度 🔄</button>`;
      } else {
        document.getElementById('resultButtons').innerHTML = `
          <button class="change-cat-btn" onclick="isDaily=false;showScreen('start')">カテゴリ変更</button>
          <button class="restart-btn" onclick="startQuiz()">もう一度 🔄</button>`;
      }
      showScreen('result');
    }

    // ── Daily Quiz & Streak ───────────────────────────────────────
    function getToday() {
      return new Date().toLocaleDateString('sv-SE');
    }
    function getYesterday() {
      const d = new Date(); d.setDate(d.getDate() - 1);
      return d.toLocaleDateString('sv-SE');
    }
    function updateStreak() {
      const today = getToday();
      const last = localStorage.getItem('tora_streak_date') || '';
      const count = parseInt(localStorage.getItem('tora_streak_count') || '0');
      if (last === today) return count;
      const newCount = last === getYesterday() ? count + 1 : 1;
      localStorage.setItem('tora_streak_date', today);
      localStorage.setItem('tora_streak_count', String(newCount));
      return newCount;
    }
    function getStreak() {
      return parseInt(localStorage.getItem('tora_streak_count') || '0');
    }
    function renderStreak() {
      const n = getStreak();
      const el = document.getElementById('streakBadge');
      if (n >= 2) { el.textContent = `🔥 ${n}日連続！`; el.className = 'streak-badge'; }
      else if (n === 1) { el.textContent = '🔥 1日目！続けよう！'; el.className = 'streak-badge'; }
      else { el.textContent = '今日から始めよう！'; el.className = 'streak-badge streak-zero'; }
    }
    function isDailyDone() {
      return localStorage.getItem('tora_daily_date') === getToday();
    }
    function completeDailyQuiz() {
      localStorage.setItem('tora_daily_date', getToday());
      renderDailyBtn();
      renderStreak();
    }
    function renderDailyBtn() {
      const area = document.getElementById('dailyArea');
      if (isDailyDone()) {
        area.innerHTML = '<div class="daily-done-badge">✅ 今日のデイリー完了！明日また来よう！</div>';
      } else {
        area.innerHTML = '<button class="daily-btn" onclick="startDailyQuiz()">📅 デイリークイズ（10問）</button>';
      }
    }
    function startDailyQuiz() {
      isDaily = true;
      isDailyReview = false;
      dailyWrongFirst = [];
      dailyReviewWrong = [];
      questions = shuffle(ALL_QUESTIONS).slice(0, 10);
      currentIndex = 0;
      score = 0;
      catStats = {};
      retriedCurrent = false;
      showScreen('quiz');
      renderQuestion();
    }
    function startDailyReview() {
      isDailyReview = true;
      dailyReviewWrong = [];
      questions = [...dailyWrongFirst];
      currentIndex = 0;
      score = 0;
      catStats = {};
      retriedCurrent = false;
      showScreen('quiz');
      renderQuestion();
    }
    function goHome() {
      isDaily = false;
      isDailyReview = false;
      renderDailyBtn();
      renderStreak();
      showScreen('start');
    }

    // ── Weak Questions ────────────────────────────────────────────
    const WEAK_KEY  = 'tora_weak';
    function loadWeak() { return new Set(JSON.parse(localStorage.getItem(WEAK_KEY) || '[]')); }
    function saveWeak(s) { localStorage.setItem(WEAK_KEY, JSON.stringify([...s])); }

    // ── 新着問題管理 ──────────────────────────────────────────────
    const NEW_SEEN_KEY = 'tora_seen_new';
    function loadSeenNew() { return new Set(JSON.parse(localStorage.getItem(NEW_SEEN_KEY) || '[]')); }
    function markAllNewSeen() {
      const texts = ALL_QUESTIONS.filter(q => q.isNew).map(q => q.text);
      localStorage.setItem(NEW_SEEN_KEY, JSON.stringify(texts));
    }
    function getNewPool() {
      const seen = loadSeenNew();
      return ALL_QUESTIONS.filter(q => q.isNew && !seen.has(q.text));
    }
    function countUnseen() { return getNewPool().length; }

    // ── 累計成績 ──────────────────────────────────────────────────
    const STATS_KEY = 'tora_stats_v1';
    function loadAllStats() { return JSON.parse(localStorage.getItem(STATS_KEY) || '{}'); }
    function updateAllStats(cat, correct) {
      const s = loadAllStats();
      if (!s[cat]) s[cat] = { c: 0, t: 0 };
      s[cat].t++;
      if (correct) s[cat].c++;
      localStorage.setItem(STATS_KEY, JSON.stringify(s));
    }

    let statsOpen = false;
    function toggleStats() {
      statsOpen = !statsOpen;
      document.getElementById('statsSection').style.display = statsOpen ? '' : 'none';
      document.getElementById('statsToggle').textContent =
        statsOpen ? '📊 累計成績を閉じる ▴' : '📊 累計成績を見る ▾';
      if (statsOpen) renderStats();
    }

    function renderStats() {
      const sec = document.getElementById('statsSection');
      const s = loadAllStats();
      const cats = Object.keys(s);
      if (cats.length === 0) {
        sec.innerHTML = '<div class="stats-empty">まだデータがありません。クイズを解いてみよう！</div>';
        return;
      }
      const totalT = cats.reduce((a, k) => a + s[k].t, 0);
      const totalC = cats.reduce((a, k) => a + s[k].c, 0);
      const overallPct = Math.round((totalC / totalT) * 100);

      // カテゴリをCATS順に並べる（__label__を除く）
      const catOrder = CATS.filter(c => c.key !== '__label__').map(c => c.key);
      const sorted = [...cats].sort((a, b) => {
        const ia = catOrder.indexOf(a), ib = catOrder.indexOf(b);
        return (ia === -1 ? 99 : ia) - (ib === -1 ? 99 : ib);
      });

      const rows = sorted.map(cat => {
        const { c, t } = s[cat];
        const p = Math.round((c / t) * 100);
        const color = p >= 80 ? '#3fb950' : p >= 60 ? '#e3b341' : '#f85149';
        return `<div class="cat-row">
          <span class="cat-row-name">${escapeHtml(cat)}</span>
          <div class="cat-bar-bg"><div class="cat-bar-fill" style="width:${p}%;background:${color}"></div></div>
          <span class="cat-row-pct">${c}/${t}</span>
        </div>`;
      }).join('');

      sec.innerHTML = `
        <div class="stats-overall">累計 <strong>${totalT}</strong> 問回答 ／ 正答率 <strong>${overallPct}%</strong></div>
        <div class="cat-breakdown" style="margin:0;border:none;border-radius:0">
          <div class="cat-breakdown-title">カテゴリ別（正解数/回答数）</div>
          ${rows}
        </div>`;
    }

    function updateWeakBtn() {
      const weak = loadWeak();
      const btn = document.getElementById('weakBtn');
      const pool = ALL_QUESTIONS.filter(q =>
        (selectedCategory === 'all' || q.category === selectedCategory) && weak.has(q.text)
      );
      if (pool.length > 0) {
        btn.style.display = '';
        document.getElementById('weakCount').textContent = `(${pool.length}問)`;
      } else {
        btn.style.display = 'none';
      }
    }

    let practiceScenarioIdx = -1;
    let practiceStep = 0;
    let practiceSelections = [];

    function startPracticeMode() {
      showScreen('practice');
      document.getElementById('practiceScenarioSelect').style.display = '';
      document.getElementById('practiceStepView').style.display       = 'none';
      document.getElementById('practiceSummaryView').style.display    = 'none';
      buildScenarioGrid();
    }

    function buildScenarioGrid() {
      const grid = document.getElementById('scenarioGrid');
      grid.innerHTML = '';
      PRACTICE_SCENARIOS.forEach((s, i) => {
        const btn = document.createElement('button');
        btn.className = 'scenario-card';
        btn.innerHTML = `<span class="scenario-icon">${s.icon}</span><div class="scenario-info"><div class="scenario-title">${escapeHtml(s.title)}</div><div class="scenario-desc">${escapeHtml(s.description)}</div></div>`;
        btn.onclick = () => selectScenario(i);
        grid.appendChild(btn);
      });
    }

    function selectScenario(idx) {
      practiceScenarioIdx = idx;
      practiceStep        = 0;
      practiceSelections  = [];
      document.getElementById('practiceScenarioSelect').style.display = 'none';
      document.getElementById('practiceStepView').style.display       = '';
      document.getElementById('practiceSummaryView').style.display    = 'none';
      const s = PRACTICE_SCENARIOS[idx];
      document.getElementById('practiceScenarioBadge').textContent = s.icon + ' ' + s.title;
      renderPracticeStep();
    }

    function backToScenarioSelect() {
      document.getElementById('practiceScenarioSelect').style.display = '';
      document.getElementById('practiceStepView').style.display       = 'none';
      document.getElementById('practiceSummaryView').style.display    = 'none';
    }

    function renderPracticeStep() {
      const meta    = PRACTICE_STEPS_META[practiceStep];
      const choices = PRACTICE_CHOICES[practiceStep];

      // 進行ドット
      document.getElementById('practiceStepProgress').innerHTML =
        PRACTICE_STEPS_META.map((_, i) =>
          `<div class="practice-step-dot ${i < practiceStep ? 'done' : i === practiceStep ? 'active' : ''}"></div>`
        ).join('');

      document.getElementById('practiceStepLabel').textContent    = meta.label;
      document.getElementById('practiceStepTitle').textContent    = meta.title;
      document.getElementById('practiceStepQuestion').textContent = meta.question;

      const container = document.getElementById('practiceChoices');
      container.innerHTML = '';
      choices.forEach((c, i) => {
        const btn = document.createElement('button');
        btn.className = 'practice-choice-btn';
        btn.innerHTML = `<span class="practice-choice-icon">${c.icon}</span><div class="practice-choice-info"><div class="practice-choice-name">${escapeHtml(c.name)}</div><div class="practice-choice-desc">${escapeHtml(c.desc)}</div></div>`;
        btn.onclick = () => confirmPracticeChoice(i);
        container.appendChild(btn);
      });

      document.getElementById('practiceFeedback').className = 'practice-feedback';
      document.getElementById('practiceNextBtn').style.display = 'none';
    }

    function confirmPracticeChoice(choiceIdx) {
      const stepRatings = PRACTICE_SCENARIOS[practiceScenarioIdx].ratings[practiceStep];
      const rating = stepRatings[choiceIdx];
      const choice = PRACTICE_CHOICES[practiceStep][choiceIdx];
      practiceSelections.push({ choiceIdx, ...rating, choiceName: choice.name });

      document.querySelectorAll('.practice-choice-btn').forEach((btn, i) => {
        btn.disabled = true;
        if (i === choiceIdx) btn.classList.add('selected');
      });

      const ratingLabel   = { 3: '◎ 最適！', 2: '○ 良い選択', 1: '△ 惜しい', 0: '× 不向き' };
      const badgeClass    = { 3: 'r3', 2: 'r2', 1: 'r1', 0: 'r0' };
      const feedbackClass = { 3: 'fb-3', 2: 'fb-2', 1: 'fb-1', 0: 'fb-0' };

      document.getElementById('practiceFbBadge').textContent = rating.mark;
      document.getElementById('practiceFbBadge').className   = `practice-fb-badge ${badgeClass[rating.pts]}`;
      document.getElementById('practiceFbLabel').textContent = ratingLabel[rating.pts];
      document.getElementById('practiceFbText').textContent  = rating.reason;
      document.getElementById('practiceFeedback').className  = `practice-feedback ${feedbackClass[rating.pts]} show`;

      // 最適選択肢の表示（◎以外を選んだとき）
      const bestEl = document.getElementById('practiceFbBest');
      if (rating.pts < 3) {
        const bestChoices = stepRatings
          .map((r, i) => ({ ...r, idx: i }))
          .filter(r => r.pts === 3);
        if (bestChoices.length > 0) {
          bestEl.style.display = '';
          bestEl.innerHTML = `<div class="practice-fb-best-label">💡 最適な選択肢</div>` +
            bestChoices.map(b => {
              const c = PRACTICE_CHOICES[practiceStep][b.idx];
              return `<div class="practice-fb-best-item">
                <span class="practice-fb-badge r3">${escapeHtml(c.icon)}</span>
                <div class="practice-fb-best-content">
                  <div class="practice-fb-best-name">${escapeHtml(c.name)}</div>
                  <div class="practice-fb-best-reason">${escapeHtml(b.reason)}</div>
                </div>
              </div>`;
            }).join('');
        } else {
          bestEl.style.display = 'none';
        }
      } else {
        bestEl.style.display = 'none';
      }

      const isLast = practiceStep === PRACTICE_STEPS_META.length - 1;
      const nb = document.getElementById('practiceNextBtn');
      nb.textContent   = isLast ? '総評を見る 🎉' : '次のステップへ →';
      nb.style.display = 'block';
      nb.className     = 'next-btn show';
    }

    function nextPracticeStep() {
      practiceStep++;
      if (practiceStep >= PRACTICE_STEPS_META.length) {
        showPracticeSummary();
      } else {
        renderPracticeStep();
      }
    }

    function showPracticeSummary() {
      document.getElementById('practiceStepView').style.display    = 'none';
      document.getElementById('practiceSummaryView').style.display = '';

      const totalPts = practiceSelections.reduce((s, r) => s + r.pts, 0);
      const maxPts   = PRACTICE_STEPS_META.length * 3;

      const [emoji, title] =
        totalPts === maxPts ? ['🏆', '完璧な構成！プロと同じ判断です'] :
        totalPts >= 9       ? ['✨', '良い構成です！実際に動くアプリが作れます'] :
        totalPts >= 6       ? ['📖', 'もう少しで完璧！各ステップを振り返ろう'] :
                             ['💪', '各ステップのヒントをじっくり読んでみよう'];

      document.getElementById('practiceResultEmoji').textContent = emoji;
      document.getElementById('practiceResultTitle').textContent = title;
      document.getElementById('practiceResultScore').innerHTML   =
        `合計スコア：<strong>${totalPts} / ${maxPts}</strong>`;

      const markColor = { '◎': '#00ffb4', '○': '#58a6ff', '△': '#e3b341', '×': '#f85149' };
      document.getElementById('practiceSummaryCards').innerHTML =
        practiceSelections.map((sel, i) => {
          const meta  = PRACTICE_STEPS_META[i];
          const color = markColor[sel.mark];
          return `<div class="practice-summary-card">
            <div class="practice-summary-card-top">
              <span class="practice-summary-step-lbl">${escapeHtml(meta.label)}</span>
              <span style="font-weight:700;color:${color};font-size:1.05rem;">${sel.mark}</span>
            </div>
            <div class="practice-summary-choice">${escapeHtml(sel.choiceName)}</div>
            <div class="practice-summary-reason">${escapeHtml(sel.reason)}</div>
          </div>`;
        }).join('');
    }

    // ── Init ──────────────────────────────────────────────────────
    initFilterGrid();
    initDiffFilter();
    buildWordList();
    updateWeakBtn();
    updateStreak();
    renderStreak();
    renderDailyBtn();
    showScreen('start');
  </script>
