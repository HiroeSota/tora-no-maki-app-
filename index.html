<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>虎の巻 クイズアプリ</title>
  <style>
    /* ── リセット ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── ベース：集中力が上がる深夜コーディング風ダークテーマ ── */
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d1117;
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      color: #e6edf3;
    }

    /* ── 背景のグラデーション装飾 ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 20%, rgba(0, 255, 180, 0.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 35% at 80% 80%, rgba(88, 166, 255, 0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    /* ── カード ── */
    .quiz-card {
      position: relative;
      width: min(680px, 92vw);
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 40px 44px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
    }

    /* ── ヘッダー ── */
    .quiz-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .quiz-title {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #00ffb4;
    }

    .progress-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }

    .progress-label {
      font-size: 0.75rem;
      color: #8b949e;
    }

    .progress-bar-bg {
      width: 120px;
      height: 6px;
      background: #21262d;
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #00ffb4, #58a6ff);
      border-radius: 99px;
      transition: width 0.4s ease;
      width: 0%;
    }

    /* ── カテゴリバッジ ── */
    .category-badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 99px;
      margin-bottom: 14px;
      background: rgba(88, 166, 255, 0.15);
      border: 1px solid rgba(88, 166, 255, 0.35);
      color: #58a6ff;
    }

    /* ── 問題文 ── */
    .question-number {
      font-size: 0.75rem;
      color: #8b949e;
      margin-bottom: 8px;
    }

    .question-text {
      font-size: 1.3rem;
      font-weight: 600;
      line-height: 1.6;
      color: #e6edf3;
      margin-bottom: 32px;
      min-height: 4rem;
    }

    /* ── 選択肢 ── */
    .choices {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .choice-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 14px 18px;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 10px;
      color: #c9d1d9;
      font-size: 0.95rem;
      font-family: inherit;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.15s, background 0.15s, color 0.15s, transform 0.1s;
    }

    .choice-btn:hover:not(:disabled) {
      border-color: #58a6ff;
      background: #1c2128;
      color: #e6edf3;
      transform: translateX(3px);
    }

    .choice-btn .choice-label {
      flex-shrink: 0;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #30363d;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      color: #8b949e;
      transition: background 0.15s, color 0.15s;
    }

    /* 正解 */
    .choice-btn.correct {
      border-color: #00ffb4;
      background: rgba(0, 255, 180, 0.1);
      color: #00ffb4;
    }
    .choice-btn.correct .choice-label {
      background: #00ffb4;
      color: #0d1117;
    }

    /* 不正解 */
    .choice-btn.wrong {
      border-color: #f85149;
      background: rgba(248, 81, 73, 0.1);
      color: #f85149;
    }
    .choice-btn.wrong .choice-label {
      background: #f85149;
      color: #fff;
    }

    .choice-btn:disabled { cursor: not-allowed; }

    /* ── フィードバックバナー ── */
    .feedback {
      margin-top: 24px;
      padding: 14px 18px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      display: none;
      align-items: center;
      gap: 10px;
    }

    .feedback.show { display: flex; }

    .feedback.correct-fb {
      background: rgba(0, 255, 180, 0.12);
      border: 1px solid rgba(0, 255, 180, 0.4);
      color: #00ffb4;
    }

    .feedback.wrong-fb {
      background: rgba(248, 81, 73, 0.12);
      border: 1px solid rgba(248, 81, 73, 0.4);
      color: #f85149;
    }

    .feedback .fb-icon { font-size: 1.3rem; }

    .feedback .fb-text { flex: 1; }

    .feedback .fb-hint {
      font-size: 0.82rem;
      font-weight: 400;
      color: #8b949e;
      margin-top: 4px;
    }

    /* ── 次へボタン ── */
    .next-btn {
      display: none;
      margin-top: 20px;
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #00ffb4 0%, #58a6ff 100%);
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      color: #0d1117;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.04em;
    }

    .next-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .next-btn:active { transform: translateY(0); }
    .next-btn.show { display: block; }

    /* ── 結果画面 ── */
    .result-screen {
      text-align: center;
      display: none;
    }

    .result-screen.show { display: block; }

    .result-emoji { font-size: 4rem; margin-bottom: 16px; }

    .result-title {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #00ffb4, #58a6ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .result-score {
      font-size: 1.1rem;
      color: #8b949e;
      margin-bottom: 32px;
    }

    .result-score strong {
      font-size: 2rem;
      color: #e6edf3;
      -webkit-text-fill-color: #e6edf3;
    }

    .restart-btn {
      padding: 14px 40px;
      background: linear-gradient(135deg, #00ffb4 0%, #58a6ff 100%);
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      color: #0d1117;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    .restart-btn:hover { opacity: 0.9; transform: translateY(-1px); }

    /* ── メインクイズ本体 ── */
    .quiz-body { }

    /* ── レスポンシブ ── */
    @media (max-width: 480px) {
      .quiz-card { padding: 28px 20px; }
      .question-text { font-size: 1.1rem; }
    }
  </style>
</head>
<body>

  <div class="quiz-card">

    <!-- ヘッダー -->
    <div class="quiz-header">
      <span class="quiz-title">🐯 虎の巻 Quiz</span>
      <div class="progress-wrap">
        <span class="progress-label" id="progressLabel">1 / 10</span>
        <div class="progress-bar-bg">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>
    </div>

    <!-- クイズ本体 -->
    <div class="quiz-body" id="quizBody">
      <div class="category-badge" id="categoryBadge">コマンド</div>
      <div class="question-number" id="questionNumber">Q1</div>
      <div class="question-text" id="questionText">問題がここに入ります</div>

      <div class="choices" id="choicesContainer">
        <!-- JS で動的生成 -->
      </div>

      <!-- フィードバック -->
      <div class="feedback" id="feedback">
        <span class="fb-icon" id="fbIcon"></span>
        <div class="fb-text">
          <div id="fbMain"></div>
          <div class="fb-hint" id="fbHint"></div>
        </div>
      </div>

      <!-- 次へ -->
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">次の問題へ →</button>
    </div>

    <!-- 結果画面 -->
    <div class="result-screen" id="resultScreen">
      <div class="result-emoji" id="resultEmoji"></div>
      <div class="result-title" id="resultTitle"></div>
      <div class="result-score" id="resultScore"></div>
      <button class="restart-btn" onclick="startQuiz()">もう一度チャレンジ 🔄</button>
    </div>

  </div>

  <script>
    // ── 問題データ ─────────────────────────────────────────────
    const ALL_QUESTIONS = [
      {
        category: 'コマンド',
        text: '`cd` コマンドの正式名称・意味として正しいものはどれ？',
        choices: [
          'Copy Directory（ディレクトリをコピーする）',
          'Change Directory（ディレクトリを移動する）',
          'Create Directory（ディレクトリを作成する）',
          'Current Directory（現在のディレクトリを表示する）',
        ],
        answer: 1,
        hint: 'cd .. で一つ上の階層に戻れるのも "移動" の操作です。',
      },
      {
        category: 'コマンド',
        text: '新しいディレクトリを作成するコマンドはどれ？',
        choices: ['touch', 'ls', 'mkdir', 'rm'],
        answer: 2,
        hint: 'make directory の略です。',
      },
      {
        category: 'コマンド',
        text: 'ターミナルで現在いるディレクトリのパスを確認するコマンドは？',
        choices: ['ls', 'pwd', 'cat', 'echo'],
        answer: 1,
        hint: 'print working directory の略です。',
      },
      {
        category: 'Git',
        text: '変更ファイルをステージングエリアに追加する Git コマンドは？',
        choices: ['git commit', 'git push', 'git add', 'git status'],
        answer: 2,
        hint: 'コミット前に「舞台に上げる」イメージです。',
      },
      {
        category: 'Git',
        text: 'ステージングした変更を記録（保存）する Git コマンドは？',
        choices: ['git add', 'git save', 'git commit', 'git push'],
        answer: 2,
        hint: '-m "メッセージ" でコミットメッセージを付けます。',
      },
      {
        category: 'Git',
        text: 'ローカルのコミットをリモートリポジトリに送信するコマンドは？',
        choices: ['git pull', 'git fetch', 'git merge', 'git push'],
        answer: 3,
        hint: '「押し出す」イメージ。GitHub に反映されます。',
      },
      {
        category: 'Git',
        text: 'リモートリポジトリの変更を取得して、ローカルに統合するコマンドは？',
        choices: ['git push', 'git clone', 'git pull', 'git init'],
        answer: 2,
        hint: 'fetch + merge を一度に行います。',
      },
      {
        category: '言語の違い',
        text: 'Java と JavaScript の関係として最も正確な説明はどれ？',
        choices: [
          'Java の軽量バージョンが JavaScript である',
          '名前が似ているだけで、別の会社が開発した全く異なる言語',
          'JavaScript は Java のブラウザ向け方言である',
          '現在は同じ規格に統一されている',
        ],
        answer: 1,
        hint: 'Java は Sun Microsystems、JS は Netscape が開発。当時の流行に乗った命名です。',
      },
      {
        category: '言語の違い',
        text: 'JavaScript が主に動作する環境として最も適切なものはどれ？',
        choices: [
          'サーバーサイドのみ',
          'ブラウザ（クライアントサイド）、および Node.js 等でサーバーサイドも可',
          'モバイルアプリ専用',
          'データベース操作専用',
        ],
        answer: 1,
        hint: 'Node.js の登場でサーバーサイドでも使えるようになりました。',
      },
      {
        category: 'Web 基礎',
        text: 'HTML・CSS・JavaScript それぞれの役割の組み合わせとして正しいものはどれ？',
        choices: [
          'HTML＝デザイン／CSS＝構造／JS＝アニメーション',
          'HTML＝構造／CSS＝装飾・レイアウト／JS＝動的処理',
          'HTML＝プログラム／CSS＝データ／JS＝表示',
          'HTML＝色指定／CSS＝文章／JS＝画像',
        ],
        answer: 1,
        hint: '骨格・外見・動き、と覚えると整理しやすいです。',
      },
    ];

    // ── 状態 ────────────────────────────────────────────────────
    let questions = [];
    let currentIndex = 0;
    let score = 0;
    let answered = false;

    // ── ユーティリティ：配列シャッフル ──────────────────────────
    function shuffle(arr) {
      return [...arr].sort(() => Math.random() - 0.5);
    }

    // ── クイズ開始 ───────────────────────────────────────────────
    function startQuiz() {
      questions = shuffle(ALL_QUESTIONS).slice(0, 10);
      currentIndex = 0;
      score = 0;

      document.getElementById('quizBody').style.display = '';
      document.getElementById('resultScreen').classList.remove('show');

      renderQuestion();
    }

    // ── 問題描画 ─────────────────────────────────────────────────
    function renderQuestion() {
      answered = false;
      const q = questions[currentIndex];
      const total = questions.length;

      // ヘッダー
      document.getElementById('progressLabel').textContent = `${currentIndex + 1} / ${total}`;
      document.getElementById('progressBar').style.width = `${(currentIndex / total) * 100}%`;

      // 問題文
      document.getElementById('categoryBadge').textContent = q.category;
      document.getElementById('questionNumber').textContent = `Q${currentIndex + 1}`;
      document.getElementById('questionText').textContent = q.text;

      // 選択肢
      const container = document.getElementById('choicesContainer');
      container.innerHTML = '';
      const labels = ['A', 'B', 'C', 'D'];

      q.choices.forEach((text, i) => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.innerHTML = `<span class="choice-label">${labels[i]}</span><span>${text}</span>`;
        btn.onclick = () => selectAnswer(i);
        container.appendChild(btn);
      });

      // フィードバック・次へ リセット
      const fb = document.getElementById('feedback');
      fb.className = 'feedback';
      document.getElementById('nextBtn').classList.remove('show');
    }

    // ── 回答選択 ─────────────────────────────────────────────────
    function selectAnswer(selectedIndex) {
      if (answered) return;
      answered = true;

      const q = questions[currentIndex];
      const buttons = document.querySelectorAll('.choice-btn');
      const isCorrect = selectedIndex === q.answer;

      // ボタンを無効化
      buttons.forEach(btn => (btn.disabled = true));

      // 正解・不正解の色付け
      buttons[selectedIndex].classList.add(isCorrect ? 'correct' : 'wrong');
      if (!isCorrect) {
        buttons[q.answer].classList.add('correct');
      }

      // フィードバック表示
      const fb = document.getElementById('feedback');
      if (isCorrect) {
        score++;
        fb.className = 'feedback correct-fb show';
        document.getElementById('fbIcon').textContent = '✅';
        document.getElementById('fbMain').textContent = '正解！すばらしい！';
        document.getElementById('fbHint').textContent = q.hint;
      } else {
        fb.className = 'feedback wrong-fb show';
        document.getElementById('fbIcon').textContent = '❌';
        document.getElementById('fbMain').textContent = `不正解… 正解は「${['A','B','C','D'][q.answer]}」でした。`;
        document.getElementById('fbHint').textContent = q.hint;
      }

      // 次へボタン表示
      const nextBtn = document.getElementById('nextBtn');
      nextBtn.textContent = currentIndex + 1 < questions.length ? '次の問題へ →' : '結果を見る 🎉';
      nextBtn.classList.add('show');
    }

    // ── 次の問題 ─────────────────────────────────────────────────
    function nextQuestion() {
      currentIndex++;
      if (currentIndex < questions.length) {
        renderQuestion();
      } else {
        showResult();
      }
    }

    // ── 結果表示 ─────────────────────────────────────────────────
    function showResult() {
      document.getElementById('quizBody').style.display = 'none';
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressLabel').textContent = `${questions.length} / ${questions.length}`;

      const total = questions.length;
      const pct = Math.round((score / total) * 100);

      let emoji, title;
      if (pct === 100)      { emoji = '🏆'; title = '完璧！全問正解！'; }
      else if (pct >= 80)   { emoji = '🎉'; title = 'すごい！よく覚えてる！'; }
      else if (pct >= 60)   { emoji = '👍'; title = 'なかなか良い！あと少し！'; }
      else if (pct >= 40)   { emoji = '📖'; title = 'もう一度復習しよう！'; }
      else                   { emoji = '💪'; title = '虎の巻を読み直そう！'; }

      document.getElementById('resultEmoji').textContent = emoji;
      document.getElementById('resultTitle').textContent = title;
      document.getElementById('resultScore').innerHTML =
        `正解数：<strong>${score} / ${total}</strong>（正解率 ${pct}%）`;

      document.getElementById('resultScreen').classList.add('show');
    }

    // ── 起動 ────────────────────────────────────────────────────
    startQuiz();
  </script>

</body>
</html>
